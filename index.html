<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDev Tools</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 15px; }
        
        #main-menu { display: block; }
        #tool-view { display: none; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #569cd6; margin: 0; }
        .header p { color: #888; font-size: 14px; margin: 5px 0 0 0; }
        
        .category-title { color: #dcdcaa; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 20px 0 10px 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .tool-btn { background-color: #2d2d2d; border: 1px solid #444; border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .tool-btn:active { background-color: #3d3d3d; transform: scale(0.95); }
        .tool-btn span { display: block; font-size: 24px; margin-bottom: 5px; }
        .tool-btn label { font-size: 12px; color: #d4d4d4; cursor: pointer; display: block; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: none; border: 1px solid #444; color: #d4d4d4; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .tool-title { color: #569cd6; font-size: 18px; font-weight: bold; }
        
        .tool-container { display: none; }
        .tool-container.active { display: block; }
        
        textarea { width: 100%; height: 25vh; background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; direction: ltr; text-align: left; }
        button { width: 100%; padding: 12px; background-color: #0e639c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:active { background-color: #1177bb; }
        .buttons-row { display: flex; gap: 10px; } .buttons-row button { flex: 1; margin: 0; }
        .copy-btn { background-color: #2d7d46; margin-top: 5px !important; }
        
        .pass-display { background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 18px; text-align: center; direction: ltr; margin-bottom: 15px; word-break: break-all; user-select: all; }
        .slider-container { margin-bottom: 15px; } .slider-container label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .options-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; direction: ltr; } .option-item { flex: 1 1 40%; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .strength-bar { height: 5px; background-color: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; } .strength-fill { height: 100%; width: 0; transition: width 0.3s, background-color 0.3s; }
        select, input[type="number"], input[type="text"] { background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 16px; width: 100%; outline: none; direction: ltr; margin-bottom: 15px; }
        .jwt-box { background: #2d2d2d; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 15px; direction: ltr; font-family: 'Courier New'; font-size: 13px; white-space: pre-wrap; word-break: break-all; color: #4ec9b0; }
        .jwt-label { color: #f44747; font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; direction: ltr;}
        
        /* QR Specific */
        #qr-code { width: 180px; height: 180px; margin: 20px auto; background-color: white; padding: 10px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        #qr-code img { display: none; }
        #qr-code canvas { display: none; }
        
        /* UUID Specific */
        .uuid-box { background-color: #2d2d2d; border: 1px solid #444; border-radius: 8px; padding: 20px; text-align: center; direction: ltr; font-family: 'Courier New', monospace; font-size: 18px; color: #ce9178; letter-spacing: 2px; word-break: break-all; user-select: all; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header">
            <h2>🛠️ ProDev Tools</h2>
            <p>مجموعة أدوات المطور الشامل</p>
        </div>

        <div class="category-title">📦 البيانات و التنسيق</div>
        <div class="grid">
            <div class="tool-btn" onclick="openTool('json')"><span>🎨</span><label>JSON</label></div>
            <div class="tool-btn" onclick="openTool('yaml')"><span>🔄</span><label>YAML</label></div>
            <div class="tool-btn" onclick="openTool('hash')"><span>#️⃣</span><label>Hash</label></div>
        </div>

        <div class="category-title">🔐 التشفير و النصوص</div>
        <div class="grid">
            <div class="tool-btn" onclick="openTool('base64')"><span>🔐</span><label>Base64</label></div>
            <div class="tool-btn" onclick="openTool('url')"><span>🔗</span><label>URL</label></div>
        </div>

        <div class="category-title">🌐 الشبكات و APIs</div>
        <div class="grid">
            <div class="tool-btn" onclick="openTool('jwt')"><span>🔓</span><label>JWT</label></div>
            <div class="tool-btn" onclick="openTool('time')"><span>⏰</span><label>Time</label></div>
        </div>

        <div class="category-title">👨‍💻 أدوات المطور</div>
        <div class="grid">
            <div class="tool-btn" onclick="openTool('uuid')"><span>🆔</span><label>UUID</label></div>
            <div class="tool-btn" onclick="openTool('pass')"><span>🔑</span><label>Password</label></div>
            <div class="tool-btn" onclick="openTool('color')"><span>🎨</span><label>Color</label></div>
            <div class="tool-btn" onclick="openTool('qr')"><span>📱</span><label>QR Code</label></div>
        </div>
    </div>

    <div id="tool-view">
        <div class="top-bar">
            <button class="back-btn" onclick="goBack()">→ القائمة</button>
            <div class="tool-title" id="current-tool-title">أداة</div>
        </div>

        <!-- JSON -->
        <div id="json-tool" class="tool-container">
            <textarea id="json-input" placeholder="الصق JSON هنا..."></textarea>
            <div class="buttons-row"><button onclick="formatJSON()">تنسيق ✨</button><button onclick="minifyJSON()">ضغط 📦</button></div>
            <textarea id="json-output" readonly placeholder="النتيجة..."></textarea>
            <button onclick="copyText('json-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- YAML -->
        <div id="yaml-tool" class="tool-container">
            <textarea id="yaml-input" placeholder="الصق JSON أو YAML هنا..."></textarea>
            <div class="buttons-row"><button onclick="jsonToYaml()">JSON → YAML</button><button onclick="yamlToJson()">YAML → JSON</button></div>
            <textarea id="yaml-output" readonly placeholder="النتيجة..."></textarea>
            <button onclick="copyText('yaml-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- Base64 -->
        <div id="base64-tool" class="tool-container">
            <textarea id="b64-input" placeholder="الصق النص هنا..."></textarea>
            <div class="buttons-row"><button onclick="encodeB64()">🔒 تشفير</button><button onclick="decodeB64()">🔓 فك التشفير</button></div>
            <textarea id="b64-output" readonly placeholder="النتيجة..."></textarea>
            <button onclick="copyText('b64-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- URL -->
        <div id="url-tool" class="tool-container">
            <textarea id="url-input" placeholder="الصق الرابط أو النص هنا..."></textarea>
            <div class="buttons-row"><button onclick="encodeUrl()">🔒 Encode</button><button onclick="decodeUrl()">🔓 Decode</button></div>
            <textarea id="url-output" readonly placeholder="النتيجة..."></textarea>
            <button onclick="copyText('url-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- JWT -->
        <div id="jwt-tool" class="tool-container">
            <textarea id="jwt-input" placeholder="الصق توكن JWT هنا..."></textarea>
            <button onclick="decodeJWT()">🔓 فك تشفير التوكن</button>
            <span class="jwt-label">Header:</span><div class="jwt-box" id="jwt-header">--</div>
            <span class="jwt-label">Payload (البيانات):</span><div class="jwt-box" id="jwt-payload">--</div>
            <button onclick="copyText('jwt-payload', this)" class="copy-btn">📋 نسخ البيانات</button>
        </div>

        <!-- Timestamp -->
        <div id="time-tool" class="tool-container">
            <div style="direction:ltr;"><label style="color:#569cd6; font-size:14px; display:block; margin-bottom:5px;">Unix Timestamp:</label><input type="number" id="unix-input" placeholder="مثال: 1704067200"></div>
            <button onclick="unixToDate()">⏰ تحويل لتاريخ</button>
            <div id="date-output" style="background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444; margin-bottom:20px; direction:ltr; text-align:center; font-size:18px; color:#4ec9b0;">--</div>
            <div style="direction:ltr;"><label style="color:#569cd6; font-size:14px; display:block; margin-bottom:5px;">التاريخ (YYYY-MM-DD HH:MM:SS):</label><input type="text" id="date-input" placeholder="مثال: 2024-01-01 12:00:00"></div>
            <button onclick="dateToUnix()">🔢 تحويل لـ Unix</button>
            <div id="unix-output" style="background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444; direction:ltr; text-align:center; font-size:18px; color:#4ec9b0; user-select:all;">--</div>
            <button onclick="copyText('unix-output', this)" class="copy-btn" style="margin-top:10px;">📋 نسخ</button>
        </div>

        <!-- UUID -->
        <div id="uuid-tool" class="tool-container">
            <div class="uuid-box" id="uuid-output">اضغط على توليد</div>
            <button onclick="generateUUID()">🔄 توليد معرف UUID (v4)</button>
            <button onclick="copyText('uuid-output', this)" class="copy-btn">📋 نسخ المعرف</button>
        </div>

        <!-- Password -->
        <div id="pass-tool" class="tool-container">
            <div class="pass-display" id="pass-output">اضغط على توليد</div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="slider-container"><label><span>الطول:</span> <span id="length-val">16</span></label><input type="range" id="pass-length" min="8" max="32" value="16" oninput="generatePass()"></div>
            <div class="options-container">
                <div class="option-item"><input type="checkbox" id="opt-upper" checked onchange="generatePass()"> ABC</div>
                <div class="option-item"><input type="checkbox" id="opt-lower" checked onchange="generatePass()"> abc</div>
                <div class="option-item"><input type="checkbox" id="opt-nums" checked onchange="generatePass()"> 123</div>
                <div class="option-item"><input type="checkbox" id="opt-syms" checked onchange="generatePass()"> !@#</div>
            </div>
            <button onclick="generatePass()">🔄 توليد كلمة مرور</button>
            <button onclick="copyText('pass-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- Color -->
        <div id="color-tool" class="tool-container">
            <div id="color-preview" style="width:100%; height: 100px; background-color: #1e88e5; border-radius: 8px; border: 1px solid #444; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);"></div>
            <div style="direction:ltr; margin-bottom:20px;"><label style="color:#aaa; font-size:14px; display:block; margin-bottom:5px;">HEX Code:</label><div style="display:flex; align-items:center; background:#2d2d2d; border:1px solid #444; border-radius:8px; padding:10px; direction:ltr;"><span style="color:#888; font-size:20px; margin-left:10px;">#</span><input type="text" id="hex-input" value="1E88E5" oninput="hexToRgb()" style="background:transparent; color:#4ec9b0; border:none; outline:none; font-size:20px; font-family:'Courier New'; width:100%; letter-spacing: 2px;"></div></div>
            <div style="display:flex; gap:15px; direction:ltr; margin-bottom:15px;">
                <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;"><label style="color:#f44747; font-size:12px; display:block; margin-bottom:5px;">Red</label><input type="number" id="r-input" value="30" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#f44747; border:none; outline:none; font-size:20px; text-align:center;"></div>
                <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;"><label style="color:#4ec9b0; font-size:12px; display:block; margin-bottom:5px;">Green</label><input type="number" id="g-input" value="136" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#4ec9b0; border:none; outline:none; font-size:20px; text-align:center;"></div>
                <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;"><label style="color:#569cd6; font-size:12px; display:block; margin-bottom:5px;">Blue</label><input type="number" id="b-input" value="229" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#569cd6; border:none; outline:none; font-size:20px; text-align:center;"></div>
            </div>
            <button onclick="copyText('rgb-output-text', this)" class="copy-btn">📋 نسخ RGB</button>
            <div id="rgb-output-text" style="display:none;">rgb(30, 136, 229)</div>
        </div>

        <!-- Hash -->
        <div id="hash-tool" class="tool-container">
            <textarea id="hash-input" placeholder="الصق النص المراد تشفيره هنا..."></textarea>
            <select id="hash-type"><option value="MD5">MD5</option><option value="SHA-1">SHA-1</option><option value="SHA-256" selected>SHA-256</option><option value="SHA-512">SHA-512</option></select>
            <button onclick="generateHash()">#️⃣ إنشاء Hash</button>
            <textarea id="hash-output" readonly placeholder="النتيجة..."></textarea>
            <button onclick="copyText('hash-output', this)" class="copy-btn">📋 نسخ</button>
        </div>

        <!-- QR Code -->
        <div id="qr-tool" class="tool-container">
            <input type="text" id="qr-input" placeholder="أدخل رابط أو نص لتحويله لـ QR Code...">
            <button onclick="generateQR()">📱 إنشاء QR Code</button>
            <div id="qr-code"></div>
            <button onclick="downloadQR()" class="copy-btn">📥 تحميل كصورة</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const toolTitles = { json: "JSON Formatter", yaml: "YAML ↔ JSON", base64: "Base64", url: "URL Encode/Decode", jwt: "JWT Decoder", time: "Timestamp Converter", uuid: "UUID Generator", pass: "Password Generator", color: "Color Converter", hash: "Hash Generator", qr: "QR Code Generator" };

        function openTool(toolName) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('tool-view').style.display = 'block';
            document.getElementById('current-tool-title').innerText = toolTitles[toolName];
            document.querySelectorAll('.tool-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`${toolName}-tool`).classList.add('active');
            if(toolName === 'pass') generatePass();
            if(toolName === 'qr' && document.getElementById('qr-input').value) generateQR();
            tg.HapticFeedback.impactOccurred('light');
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('tool-view').style.display = 'none';
            tg.HapticFeedback.impactOccurred('light'); window.scrollTo(0, 0);
        }

        function copyText(elementId, btnElement) {
            const el = document.getElementById(elementId); let text = el.innerText || el.value;
            if(text && text !== '--' && text !== "اضغط على توليد" && text !== "اضغط على توليد معرف UUID (v4)") {
                navigator.clipboard.writeText(text); tg.HapticFeedback.notificationOccurred('success');
                const originalText = btnElement.innerText; btnElement.innerText = "✅ تم النسخ!"; setTimeout(() => btnElement.innerText = originalText, 1500);
            } else { tg.HapticFeedback.notificationOccurred('error'); }
        }

        // JSON
        function formatJSON() { const i = document.getElementById('json-input').value, o = document.getElementById('json-output'); try { o.value = JSON.stringify(JSON.parse(i), null, 4); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value = "❌ خطأ:\n" + e.message; o.style.color = "#f44747"; }}
        function minifyJSON() { const i = document.getElementById('json-input').value, o = document.getElementById('json-output'); try { o.value = JSON.stringify(JSON.parse(i)); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value = "❌ خطأ:\n" + e.message; o.style.color = "#f44747"; }}

        // YAML
        function jsonToYaml() { const i = document.getElementById('yaml-input').value, o = document.getElementById('yaml-output'); try { o.value = jsyaml.dump(JSON.parse(i), {indent: 2, lineWidth: -1}); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value = "❌ JSON غير صالح:\n" + e.message; o.style.color = "#f44747"; }}
        function yamlToJson() { const i = document.getElementById('yaml-input').value, o = document.getElementById('yaml-output'); try { o.value = JSON.stringify(jsyaml.load(i), null, 4); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value = "❌ YAML غير صالح:\n" + e.message; o.style.color = "#f44747"; }}

        // Base64
        function encodeB64() { const o = document.getElementById('b64-output'); try { o.value = btoa(unescape(encodeURIComponent(document.getElementById('b64-input').value))); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value="❌ خطأ"; o.style.color="#f44747"; }}
        function decodeB64() { const o = document.getElementById('b64-output'); try { o.value = decodeURIComponent(escape(atob(document.getElementById('b64-input').value))); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value="❌ خطأ"; o.style.color="#f44747"; }}

        // URL
        function encodeUrl() { const o = document.getElementById('url-output'); o.value = encodeURIComponent(document.getElementById('url-input').value); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); }
        function decodeUrl() { const o = document.getElementById('url-output'); try { o.value = decodeURIComponent(document.getElementById('url-input').value); o.style.color = "#4ec9b0"; tg.HapticFeedback.notificationOccurred('success'); } catch(e) { o.value="❌ خطأ"; o.style.color="#f44747"; }}

        // JWT
        function decodeJWT() { const i = document.getElementById('jwt-input').value.trim(), hEl = document.getElementById('jwt-header'), pEl = document.getElementById('jwt-payload'); if(!i||!i.includes('.')){hEl.innerText="❌ صيغة غير صحيحة";pEl.innerText="";return;} try { const p=i.split('.'); hEl.innerText=JSON.stringify(JSON.parse(atob(p[0].replace(/-/g,'+').replace(/_/g,'/'))),null,2); let pl=JSON.parse(atob(p[1].replace(/-/g,'+').replace(/_/g,'/'))); if(pl.exp){const e=new Date(pl.exp*1000);pl.exp_string=`\n\n⏰ Exp: ${e.toLocaleString()}\nStatus: ${Date.now()>=e*1000?'❌ منتهي':'✅ ساري'}`;} pEl.innerText=JSON.stringify(pl,null,2)+(pl.exp_string||''); tg.HapticFeedback.notificationOccurred('success'); } catch(e) { hEl.innerText="❌ خطأ: "+e.message; pEl.innerText=""; }}

        // Timestamp
        function unixToDate(){const i=document.getElementById('unix-input').value,o=document.getElementById('date-output');if(!i){o.innerText="--";return;}const d=new Date(parseInt(i)*1000);if(isNaN(d.getTime())){o.innerText="❌ غير صالح";o.style.color="#f44747";return;}o.style.color="#4ec9b0";o.innerText=d.toISOString().replace('T',' ').split('.')[0];}
        function dateToUnix(){const i=document.getElementById('date-input').value,o=document.getElementById('unix-output');if(!i){o.innerText="--";return;}const d=new Date(i);if(isNaN(d.getTime())){o.innerText="❌ تاريخ غير صالح";o.style.color="#f44747";return;}o.style.color="#4ec9b0";o.innerText=Math.floor(d.getTime()/1000);}

        // UUID
        function generateUUID() { document.getElementById('uuid-output').innerText = crypto.randomUUID(); tg.HapticFeedback.notificationOccurred('success'); }

        // Password
        function generatePass(){const l=document.getElementById('pass-length').value;document.getElementById('length-val').innerText=l;let c='';if(document.getElementById('opt-upper').checked)c+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('opt-lower').checked)c+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('opt-nums').checked)c+='0123456789';if(document.getElementById('opt-syms').checked)c+='!@#$%^&*()_+~`|}{[]:;?><,./-=';if(c===''){document.getElementById('pass-output').innerText="اختر خيار واحد";return;}let p='';for(let i=0;i<l;i++)p+=c.charAt(Math.floor(Math.random()*c.length));document.getElementById('pass-output').innerText=p;let s=0;if(l>=12)s+=25;if(l>=20)s+=25;if(document.getElementById('opt-upper').checked&&document.getElementById('opt-lower').checked)s+=25;if(document.getElementById('opt-nums').checked&&document.getElementById('opt-syms').checked)s+=25;const f=document.getElementById('strength-fill');f.style.width=s+'%';if(s<=25)f.style.backgroundColor='#f44747';else if(s<=50)f.style.backgroundColor='#dcdcaa';else if(s<=75)f.style.backgroundColor='#1e90ff';else f.style.backgroundColor='#4ec9b0';tg.HapticFeedback.notificationOccurred('success');}

        // Color
        function hexToRgb(){let h=document.getElementById('hex-input').value.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];if(h.length===6){let r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);document.getElementById('r-input').value=r;document.getElementById('g-input').value=g;document.getElementById('b-input').value=b;updateColor(r,g,b);}tg.HapticFeedback.impactOccurred('light');}
        function rgbToHex(){let r=parseInt(document.getElementById('r-input').value)||0,g=parseInt(document.getElementById('g-input').value)||0,b=parseInt(document.getElementById('b-input').value)||0;r=Math.min(255,Math.max(0,r));g=Math.min(255,Math.max(0,g));b=Math.min(255,Math.max(0,b));document.getElementById('hex-input').value=r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0').toUpperCase();updateColor(r,g,b);tg.HapticFeedback.impactOccurred('light');}
        function updateColor(r,g,b){document.getElementById('color-preview').style.backgroundColor=`rgb(${r},${g},${b})`;document.getElementById('color-preview').style.boxShadow=`0 4px 25px rgba(${r},${g},${b},0.6)`;document.getElementById('rgb-output-text').innerText=`rgb(${r}, ${g}, ${b})`;}

        // Hash
        function generateHash(){const i=document.getElementById('hash-input').value,t=document.getElementById('hash-type').value,o=document.getElementById('hash-output');if(!i){o.value="❌ أدخل نصاً";o.style.color="#f44747";return;}try{let h="";if(t==="MD5")h=CryptoJS.MD5(i).toString();else if(t==="SHA-1")h=CryptoJS.SHA1(i).toString();else if(t==="SHA-256")h=CryptoJS.SHA256(i).toString();else if(t==="SHA-512")h=CryptoJS.SHA512(i).toString();o.value=h;o.style.color="#4ec9b0";tg.HapticFeedback.notificationOccurred('success');}catch(e){o.value="❌ خطأ";o.style.color="#f44747";}}

        // QR Code
        let qrInstance = null;
        function generateQR() {
            const text = document.getElementById('qr-input').value.trim();
            if (!text) return;
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            qrInstance = new QRCode(qrContainer, { text: text, width: 160, height: 160, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
            tg.HapticFeedback.notificationOccurred('success');
        }
        function downloadQR() {
            if (!qrInstance) return;
            const canvas = document.querySelector('#qr-code canvas');
            if (!canvas) { tg.HapticFeedback.notificationOccurred('error'); return; }
            const link = document.createElement("a");
            link.download = "qrcode_prodev.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
