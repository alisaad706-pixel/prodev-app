<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز المطور | DevHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    .toast { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body class="text-slate-900 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 border-b border-teal-100/80 bg-white/80 backdrop-blur-lg">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">
      <button onclick="navigate('home')" class="flex items-center gap-2">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-teal-600 to-emerald-500 shadow-md shadow-teal-500/30">
          <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
        </div>
        <div class="text-right">
          <div class="font-bold text-lg leading-none">مركز المطور</div>
          <div class="text-[10px] font-medium text-teal-600">DevHub</div>
        </div>
      </button>
      <nav id="desktop-nav" class="hidden md:flex items-center gap-1"></nav>
      <div class="hidden lg:flex items-center gap-2 rounded-full border border-teal-200 bg-teal-50/50 px-3 py-1.5">
        <span class="relative flex h-2 w-2">
          <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-500"></span>
        </span>
        <span class="text-xs font-semibold text-teal-700"><span id="online-count">0</span> متصل الآن</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-12">
    <div id="content" class="fade-in"></div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 text-center text-sm text-slate-500">
      <p>مركز المطور — مرجعك البرمجي المتكامل © 2024</p>
    </div>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 hidden rounded-xl bg-slate-900 px-5 py-3 text-sm font-medium text-white shadow-lg"></div>

  <script>
    const NAV_ITEMS = [
      { id: "home", label: "الرئيسية" },
      { id: "tools", label: "الأدوات" },
      { id: "snippets", label: "مقتطفات" },
      { id: "colors", label: "ألوان" },
      { id: "resources", label: "مصادر" }
    ];

    let currentSection = "home";
    let stats = { total: 0, today: 0, online: 0 };

    function init() {
      buildNav();
      initStats();
      navigate("home");
    }

    function buildNav() {
      const desktop = document.getElementById("desktop-nav");
      desktop.innerHTML = NAV_ITEMS.map(item => `
        <button onclick="navigate('${item.id}')" class="nav-btn flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium transition-colors text-slate-600 hover:bg-slate-100 hover:text-slate-900" data-section="${item.id}">
          ${item.label}
        </button>
      `).join("");
    }

    function navigate(section) {
      currentSection = section;
      const content = document.getElementById("content");
      content.classList.remove("fade-in");
      void content.offsetWidth;
      content.classList.add("fade-in");

      document.querySelectorAll(".nav-btn").forEach(btn => {
        if (btn.dataset.section === section) {
          btn.classList.add("bg-teal-50", "text-teal-700");
          btn.classList.remove("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        } else {
          btn.classList.remove("bg-teal-50", "text-teal-700");
          btn.classList.add("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        }
      });

      if (section === "home") content.innerHTML = renderHome();
      else if (section === "tools") content.innerHTML = renderTools();
      else if (section === "snippets") content.innerHTML = renderSnippets();
      else if (section === "colors") content.innerHTML = renderColors();
      else if (section === "resources") content.innerHTML = renderResources();

      window.scrollTo({ top: 0, behavior: "smooth" });

      // Initialize tool specific scripts
      if (section === "tools") initTools();
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.remove("hidden");
      toast.classList.add("toast");
      setTimeout(() => {
        toast.classList.add("hidden");
        toast.classList.remove("toast");
      }, 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast("تم النسخ بنجاح!"));
    }

    function initStats() {
      const KEY = "devhub_visitors";
      const todayKey = "devhub_today";
      const today = new Date().toDateString();

      let total = parseInt(localStorage.getItem(KEY) || "4823", 10);
      let todayCount = parseInt(localStorage.getItem(todayKey) || "0", 10);
      const lastVisit = localStorage.getItem("devhub_last_visit");

      if (lastVisit !== today) {
        todayCount = 1;
        localStorage.setItem(todayKey, "1");
        localStorage.setItem("devhub_last_visit", today);
      } else {
        todayCount += 1;
        localStorage.setItem(todayKey, String(todayCount));
      }

      total += 1;
      localStorage.setItem(KEY, String(total));

      stats = { total, today: todayCount, online: Math.floor(Math.random() * 12) + 18 };
      updateStatsUI();

      setInterval(() => {
        stats.online = Math.max(12, Math.min(55, stats.online + (Math.random() > 0.5 ? 1 : -1)));
        updateStatsUI();
      }, 4000);
    }

    function updateStatsUI() {
      const onlineEl = document.getElementById("online-count");
      if (onlineEl) onlineEl.textContent = stats.online;
      const totalEl = document.getElementById("stat-total");
      if (totalEl) totalEl.textContent = stats.total.toLocaleString("ar-EG");
      const todayEl = document.getElementById("stat-today");
      if (todayEl) todayEl.textContent = stats.today.toLocaleString("ar-EG");
      const onlineStatEl = document.getElementById("stat-online");
      if (onlineStatEl) onlineStatEl.textContent = stats.online.toLocaleString("ar-EG");
    }

    function renderHome() {
      const features = [
        { section: "tools", title: "أدوات ذكية", desc: "4 أدوات برمجية تفاعلية: JSON، Base64، كلمات مرور، و QR", color: "from-teal-500 to-emerald-500" },
        { section: "snippets", title: "مقتطفات جاهزة", desc: "مكتبة من المقتطفات البرمجية الجاهزة للاستخدام في مشاريعك", color: "from-amber-500 to-orange-500" },
        { section: "colors", title: "لوحات ألوان", desc: "لوحات ألوان منسّقة ومحوّل ألوان متقدم لإلهام تصميمك", color: "from-rose-500 to-pink-500" },
        { section: "resources", title: "مصادر تعلّم", desc: "روابط لأهم المراجع والأدوات التي يحتاجها كل مطور", color: "from-indigo-500 to-violet-500" }
      ];

      return `
        <div class="space-y-10">
          <section class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-teal-700 via-teal-600 to-emerald-600 p-8 shadow-xl shadow-teal-600/20 sm:p-12">
            <div class="absolute -left-20 -top-20 h-64 w-64 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-24 -right-10 h-72 w-72 rounded-full bg-emerald-300/20 blur-3xl"></div>
            <div class="relative">
              <span class="mb-4 inline-flex items-center gap-1 rounded-full border border-white/20 bg-white/10 px-3 py-1 text-xs text-teal-50">منصة شاملة للمطورين</span>
              <h1 class="text-3xl font-bold leading-tight text-white sm:text-4xl md:text-5xl">
                كل ما يحتاجه المبرمج<br>
                <span class="text-emerald-200">في مكان واحد</span>
              </h1>
              <p class="mt-4 max-w-xl text-base leading-relaxed text-teal-50/90 sm:text-lg">
                أدوات تفاعلية، مقتطفات برمجية، لوحات ألوان، ومصادر تعلّم — كل ما تحتاجه في رحلتك البرمجية جمعناه لك في منصة واحدة أنيقة وسريعة.
              </p>
              <div class="mt-6 flex flex-wrap gap-3">
                <button onclick="navigate('tools')" class="rounded-xl bg-white px-6 py-3 text-sm font-semibold text-teal-700 shadow-sm transition hover:bg-teal-50">ابدأ الاستكشاف →</button>
                <button onclick="navigate('snippets')" class="rounded-xl border border-white/30 bg-transparent px-6 py-3 text-sm font-semibold text-white transition hover:bg-white/10">تصفح المقتطفات</button>
              </div>
            </div>
          </section>

          <section>
            <div class="mb-4 flex items-center gap-2">
              <h2 class="text-xl font-bold text-slate-800">إحصاءات الزوار</h2>
            </div>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
              <div class="relative overflow-hidden rounded-2xl border-0 bg-white p-5 shadow-md ring-1 ring-teal-100">
                <div class="flex items-center gap-4">
                  <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-teal-50">
                    <svg class="h-6 w-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-2a4 4 0 100-8 4 4 0 000 8z"></path></svg>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-slate-900" id="stat-total">0</div>
                    <div class="text-sm text-slate-500">إجمالي الزوار</div>
                  </div>
                </div>
              </div>
              <div class="relative overflow-hidden rounded-2xl border-0 bg-white p-5 shadow-md ring-1 ring-amber-100">
                <div class="flex items-center gap-4">
                  <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-amber-50">
                    <svg class="h-6 w-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-slate-900" id="stat-today">0</div>
                    <div class="text-sm text-slate-500">زوار اليوم</div>
                  </div>
                </div>
              </div>
              <div class="relative overflow-hidden rounded-2xl border-0 bg-white p-5 shadow-md ring-1 ring-emerald-100">
                <div class="flex items-center gap-4">
                  <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-50">
                    <svg class="h-6 w-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M23 6l-9.5 9.5-5-5L1 18"></path><path stroke-linecap="round" stroke-linejoin="round" d="M17 6h6v6"></path></svg>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-slate-900" id="stat-online">0</div>
                    <div class="text-sm text-slate-500">متصل الآن</div>
                  </div>
                  <span class="absolute left-4 top-4 flex h-2.5 w-2.5">
                    <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
                  </span>
                </div>
              </div>
            </div>
          </section>

          <section>
            <div class="mb-4 flex items-center gap-2">
              <h2 class="text-xl font-bold text-slate-800">أقسام الموقع</h2>
            </div>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
              ${features.map(f => `
                <button onclick="navigate('${f.section}')" class="group text-right">
                  <div class="h-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-lg">
                    <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br ${f.color} shadow-md">
                      <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="flex items-center justify-between text-lg font-bold">
                      ${f.title}
                      <svg class="h-4 w-4 text-slate-400 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                    <p class="mt-1 text-sm leading-relaxed text-slate-500">${f.desc}</p>
                  </div>
                </button>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderTools() {
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">أدوات المطور</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">مجموعة متكاملة من الأدوات البرمجية لتسريع عملك اليومي</p>
        </div>
        <div class="flex w-full flex-wrap gap-1 overflow-x-auto rounded-xl bg-slate-100 p-1.5 mb-4">
          <button onclick="switchTool('json')" id="btn-json" class="tool-btn flex-1 rounded-lg px-3 py-2 text-sm font-medium bg-white text-teal-700 shadow-sm">تنسيق JSON</button>
          <button onclick="switchTool('base64')" id="btn-base64" class="tool-btn flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200/50">Base64</button>
          <button onclick="switchTool('password')" id="btn-password" class="tool-btn flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200/50">كلمة مرور</button>
          <button onclick="switchTool('qr')" id="btn-qr" class="tool-btn flex-1 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200/50">رمز QR</button>
        </div>
        
        <div id="tool-content" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"></div>
      `;
    }

    function switchTool(tool) {
      document.querySelectorAll(".tool-btn").forEach(btn => {
        btn.classList.remove("bg-white", "text-teal-700", "shadow-sm");
        btn.classList.add("text-slate-600", "hover:bg-slate-200/50");
      });
      document.getElementById(`btn-${tool}`).classList.add("bg-white", "text-teal-700", "shadow-sm");
      document.getElementById(`btn-${tool}`).classList.remove("text-slate-600", "hover:bg-slate-200/50");

      const content = document.getElementById("tool-content");
      if (tool === "json") {
        content.innerHTML = `
          <h3 class="mb-1 text-lg font-bold">مُنسّق JSON</h3>
          <p class="mb-4 text-sm text-slate-500">أدخل JSON لتنسيقه والتحقق من صحته</p>
          <textarea id="json-input" rows="6" class="w-full resize-y rounded-xl border border-slate-200 p-3 font-mono text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none" placeholder='ألصق هنا... مثال: {"name":"DevHub"}'>{"name":"مركز المطور","version":1,"tools":["json","base64"]}</textarea>
          <div class="mt-3 flex gap-2">
            <button onclick="formatJson()" class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">تنسيق</button>
            <button onclick="document.getElementById('json-input').value=''" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">مسح</button>
          </div>
          <div id="json-output" class="mt-4"></div>
        `;
      } else if (tool === "base64") {
        content.innerHTML = `
          <h3 class="mb-1 text-lg font-bold">مُشفّر Base64</h3>
          <p class="mb-4 text-sm text-slate-500">قم بتشفير أو فك تشفير النصوص</p>
          <textarea id="b64-input" rows="4" class="w-full resize-y rounded-xl border border-slate-200 p-3 font-mono text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none" placeholder="أدخل النص هنا...">مرحبا بك في مركز المطور</textarea>
          <div class="mt-3 flex gap-2">
            <button onclick="encodeBase64()" class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">تشفير</button>
            <button onclick="decodeBase64()" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">فك التشفير</button>
          </div>
          <div id="b64-output" class="mt-4"></div>
        `;
      } else if (tool === "password") {
        content.innerHTML = `
          <h3 class="mb-1 text-lg font-bold">مُولّد كلمات المرور</h3>
          <p class="mb-4 text-sm text-slate-500">أنشئ كلمات مرور قوية وآمنة</p>
          <div class="flex items-center gap-4 mb-4">
            <label class="text-sm font-medium">طول كلمة المرور:</label>
            <input type="range" id="pass-length" min="6" max="32" value="16" class="w-1/2" oninput="document.getElementById('pass-val').textContent=this.value">
            <span id="pass-val" class="font-bold text-teal-600">16</span>
          </div>
          <div class="flex flex-wrap gap-4 mb-4 text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" id="pass-upper" checked class="rounded"> أحرف كبيرة (A-Z)</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="pass-lower" checked class="rounded"> أحرف صغيرة (a-z)</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="pass-num" checked class="rounded"> أرقام (0-9)</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="pass-sym" checked class="rounded"> رموز (!@#$)</label>
          </div>
          <button onclick="generatePassword()" class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">توليد كلمة المرور</button>
          <div id="pass-output" class="mt-4"></div>
        `;
      } else if (tool === "qr") {
        content.innerHTML = `
          <h3 class="mb-1 text-lg font-bold">مُولّد رمز QR</h3>
          <p class="mb-4 text-sm text-slate-500">حوّل أي نص أو رابط إلى رمز QR</p>
          <input type="text" id="qr-input" class="w-full rounded-xl border border-slate-200 p-3 text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none" placeholder="أدخل رابط أو نص..." value="https://developer.mozilla.org">
          <button onclick="generateQR()" class="mt-3 rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">إنشاء QR</button>
          <div id="qr-output" class="mt-6 flex justify-center"></div>
        `;
      }
    }

    function formatJson() {
      try {
        const input = document.getElementById("json-input").value;
        const parsed = JSON.parse(input);
        const output = JSON.stringify(parsed, null, 2);
        document.getElementById("json-output").innerHTML = `
          <div class="relative">
            <button onclick="copyToClipboard('${output.replace(/'/g, "\\'").replace(/"/g, "&quot;")}')" class="absolute left-2 top-2 rounded-lg bg-slate-700 px-2 py-1 text-xs text-white hover:bg-slate-600">نسخ</button>
            <pre class="overflow-auto rounded-xl bg-slate-900 p-4 pt-10 font-mono text-sm text-teal-300" dir="ltr">${output}</pre>
          </div>
        `;
      } catch (e) {
        document.getElementById("json-output").innerHTML = `<div class="rounded-lg bg-rose-50 p-3 text-sm text-rose-600">خطأ: JSON غير صالح</div>`;
      }
    }

    function encodeBase64() {
      const input = document.getElementById("b64-input").value;
      try {
        const encoded = btoa(unescape(encodeURIComponent(input)));
        document.getElementById("b64-output").innerHTML = `
          <div class="relative">
            <button onclick="copyToClipboard('${encoded}')" class="absolute left-2 top-2 rounded-lg bg-slate-700 px-2 py-1 text-xs text-white hover:bg-slate-600">نسخ</button>
            <pre class="overflow-auto rounded-xl bg-slate-900 p-4 pt-10 font-mono text-sm text-teal-300" dir="ltr">${encoded}</pre>
          </div>
        `;
      } catch (e) {
        document.getElementById("b64-output").innerHTML = `<div class="rounded-lg bg-rose-50 p-3 text-sm text-rose-600">خطأ في التشفير</div>`;
      }
    }

    function decodeBase64() {
      const input = document.getElementById("b64-input").value;
      try {
        const decoded = decodeURIComponent(escape(atob(input)));
        document.getElementById("b64-output").innerHTML = `
          <div class="relative">
            <button onclick="copyToClipboard('${decoded.replace(/'/g, "\\'").replace(/"/g, "&quot;")}')" class="absolute left-2 top-2 rounded-lg bg-slate-700 px-2 py-1 text-xs text-white hover:bg-slate-600">نسخ</button>
            <pre class="overflow-auto rounded-xl bg-slate-900 p-4 pt-10 font-mono text-sm text-teal-300" dir="ltr">${decoded}</pre>
          </div>
        `;
      } catch (e) {
        document.getElementById("b64-output").innerHTML = `<div class="rounded-lg bg-rose-50 p-3 text-sm text-rose-600">خطأ: النص غير مشفر بشكل صحيح</div>`;
      }
    }

    function generatePassword() {
      const length = parseInt(document.getElementById("pass-length").value);
      let chars = "";
      if (document.getElementById("pass-upper").checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (document.getElementById("pass-lower").checked) chars += "abcdefghijklmnopqrstuvwxyz";
      if (document.getElementById("pass-num").checked) chars += "0123456789";
      if (document.getElementById("pass-sym").checked) chars += "!@#$%^&*()_+~`|}{[]:;?><,./-=";
      
      if (chars === "") {
        document.getElementById("pass-output").innerHTML = `<div class="rounded-lg bg-rose-50 p-3 text-sm text-rose-600">الرجاء اختيار نوع واحد على الأقل</div>`;
        return;
      }

      let password = "";
      for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }

      document.getElementById("pass-output").innerHTML = `
        <div class="relative">
          <button onclick="copyToClipboard('${password}')" class="absolute left-2 top-2 rounded-lg bg-slate-700 px-2 py-1 text-xs text-white hover:bg-slate-600">نسخ</button>
          <div class="rounded-xl bg-slate-900 p-4 pt-10 font-mono text-lg text-teal-300 text-center" dir="ltr">${password}</div>
        </div>
      `;
    }

    function generateQR() {
      const text = document.getElementById("qr-input").value;
      if (!text) return;
      document.getElementById("qr-output").innerHTML = '<div id="qr-code"></div>';
      new QRCode(document.getElementById("qr-code"), {
        text: text,
        width: 200,
        height: 200,
        colorDark: "#0f766e",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function renderSnippets() {
      const SNIPPETS = [
        { id: 1, title: 'دالة Debounce', language: 'JavaScript', code: 'function debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}' },
        { id: 2, title: 'جلب بيانات عبر fetch', language: 'JavaScript', code: 'async function getData(url) {\n  const res = await fetch(url);\n  if (!res.ok) throw new Error("Network error");\n  return res.json();\n}' },
        { id: 3, title: 'توسيط عنصر بـ Flexbox', language: 'CSS', code: '.center {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}' },
        { id: 4, title: 'تأخير التنفيذ (Sleep)', language: 'JavaScript', code: 'const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));' }
      ];
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">مقتطفات برمجية</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">مكتبة من المقتطفات الجاهزة لتسريع عملك</p>
        </div>
        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          ${SNIPPETS.map(s => `
            <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
              <div class="mb-3 flex items-center justify-between">
                <h3 class="text-base font-bold">${s.title}</h3>
                <span class="rounded-full bg-teal-50 px-2.5 py-0.5 text-xs font-medium text-teal-700">${s.language}</span>
              </div>
              <div class="relative">
                <button onclick="copyToClipboard(\`${s.code.replace(/`/g, '\\`')}\`)" class="absolute left-2 top-2 rounded-lg bg-slate-700 px-2 py-1 text-xs text-white hover:bg-slate-600">نسخ</button>
                <pre class="overflow-auto rounded-xl bg-slate-900 p-4 pt-10 font-mono text-sm text-teal-300" dir="ltr">${s.code}</pre>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderColors() {
      const PALETTES = [
        { name: 'زمردي', colors: ['#0f766e', '#14b8a6', '#5eead4', '#ccfbf1', '#f0fdfa'] },
        { name: 'عنبري', colors: ['#b45309', '#f59e0b', '#fcd34d', '#fef3c7', '#fffbeb'] },
        { name: 'وردي', colors: ['#be123c', '#f43f5e', '#fda4af', '#ffe4e6', '#fff1f2'] },
        { name: 'نيلي', colors: ['#4338ca', '#6366f1', '#a5b4fc', '#e0e7ff', '#eef2ff'] }
      ];
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">لوحات الألوان</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">لوحات منسّقة لإلهام تصاميمك (اضغط على اللون لنسخه)</p>
        </div>
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
          ${PALETTES.map(p => `
            <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
              <div class="flex h-24">
                ${p.colors.map(c => `<button onclick="copyToClipboard('${c}')" class="flex-1 transition-transform hover:scale-105" style="background-color: ${c}" title="نسخ ${c}"></button>`).join("")}
              </div>
              <div class="flex items-center justify-between p-4">
                <span class="text-lg font-bold text-slate-800">${p.name}</span>
                <div class="flex gap-1">
                  ${p.colors.map(c => `<span class="font-mono text-xs text-slate-400">${c}</span>`).join(' ')}
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderResources() {
      const RESOURCES = [
        { title: 'MDN Web Docs', url: 'https://developer.mozilla.org', description: 'المرجع الأول للمطورين', icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' },
        { title: 'React Documentation', url: 'https://react.dev', description: 'التوثيق الرسمي لمكتبة React', icon: 'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4' },
        { title: 'Tailwind CSS', url: 'https://tailwindcss.com', description: 'إطار عمل CSS قائم على الأدوات', icon: 'M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01' }
      ];
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">مصادر تعلّم</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">روابط لأهم المراجع والأدوات</p>
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
          ${RESOURCES.map(r => `
            <a href="${r.url}" target="_blank" rel="noopener noreferrer" class="group rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-lg">
              <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-teal-50">
                <svg class="h-6 w-6 text-teal-600 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="${r.icon}"></path></svg>
              </div>
              <h3 class="text-lg font-bold text-slate-800">${r.title}</h3>
              <p class="mt-1 text-sm text-slate-500">${r.description}</p>
            </a>
          `).join("")}
        </div>
      `;
    }

    init();
  </script>
</body>
