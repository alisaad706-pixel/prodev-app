<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صندوق أدوات المبرمج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .font-mono { font-family: 'Fira Code', monospace; }
    .font-serif { font-family: 'Tajawal', sans-serif; font-weight: 900; }
    
    .toast {
      animation: slideDown 0.3s ease-out forwards;
    }
    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #0f172a; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center"></div>

  <header class="relative overflow-hidden border-b border-slate-800 bg-gradient-to-b from-emerald-950/40 to-slate-950">
    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 20% 50%, #047857 0%, transparent 50%), radial-gradient(circle at 80% 20%, #0e7490 0%, transparent 40%);"></div>
    <div class="relative max-w-7xl mx-auto px-6 py-10 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-900/50">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight font-serif">صندوق أدوات المبرمج</h1>
          <p class="text-emerald-400/80 text-sm mt-1">مجموعة متكاملة من الأدوات للمطورين</p>
        </div>
      </div>
      <div class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800/60 border border-slate-700 text-sm text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        <span>أدوات محلية</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="grid-view" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    <div id="tool-view" class="hidden"></div>
  </main>

  <footer class="border-t border-slate-800 mt-16">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-slate-500 text-sm">
      <p class="flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        جميع العمليات تتم محلياً في متصفحك — لا يتم إرسال أي بيانات
      </p>
    </div>
  </footer>

  <script>
    // --- Utilities ---
    const showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast px-4 py-2 rounded-lg shadow-lg text-sm font-medium border ${
        type === 'success' ? 'bg-emerald-900 text-white border-emerald-700' : 'bg-red-900 text-white border-red-700'
      }`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    };

    const copyToClipboard = (text, label = "تم النسخ") => {
      navigator.clipboard.writeText(text).then(() => showToast(label));
    };

    // --- Icons ---
    const icons = {
      Key: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>',
      Qr: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7h-7z"/></svg>',
      Base: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>',
      Hash: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>',
      Code: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
      Palette: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>',
      Type: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',
      Link: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
      Braces: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/></svg>',
      File: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
      Cap: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
      Lang: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>',
      Users: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      Back: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>',
      Copy: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
      Refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
      Play: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
      Ext: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
      Check: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      Circle: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>',
      Clock: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      Trend: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
      Act: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'
    };

    // --- Tools Definition ---
    const tools = [
      { id: 'password', arabicName: 'مولد كلمات السر', description: 'أنشئ كلمات سر قوية وآمنة', icon: 'Key', bgColor: 'bg-emerald-500' },
      { id: 'qrcode', arabicName: 'مولد رمز QR', description: 'حوّل أي نص إلى رمز QR', icon: 'Qr', bgColor: 'bg-teal-500' },
      { id: 'base64', arabicName: 'مشفر Base64', description: 'تشفير وفك تشفير Base64', icon: 'Base', bgColor: 'bg-cyan-500' },
      { id: 'hash', arabicName: 'مولد الهاش', description: 'أنشئ قيم هاش SHA-1/256/512', icon: 'Hash', bgColor: 'bg-sky-500' },
      { id: 'formatter', arabicName: 'منسق الأكواد', description: 'نسّق JSON و HTML و CSS', icon: 'Code', bgColor: 'bg-indigo-500' },
      { id: 'color', arabicName: 'منتقي الألوان', description: 'حوّل الألوان بين HEX, RGB, HSL', icon: 'Palette', bgColor: 'bg-rose-500' },
      { id: 'lorem', arabicName: 'مولد النصوص', description: 'نصوص تجريبية (Lorem Ipsum)', icon: 'Type', bgColor: 'bg-amber-500' },
      { id: 'url', arabicName: 'مشفر الروابط', description: 'تشفير وفك تشفير URL', icon: 'Link', bgColor: 'bg-orange-500' },
      { id: 'json', arabicName: 'عارض JSON', description: 'تصفح شجرة JSON بشكل تفاعلي', icon: 'Braces', bgColor: 'bg-violet-500' },
      { id: 'text', arabicName: 'محلل النصوص', description: 'عدّاد الكلمات والأسطر والحروف', icon: 'File', bgColor: 'bg-lime-600' },
      { id: 'learn', arabicName: 'قسم تعلم البرمجة', description: 'مسارات وموارد للمبتدئين', icon: 'Cap', bgColor: 'bg-fuchsia-600' },
      { id: 'languages', arabicName: 'لغات البرمجة', description: 'معلومات ومحرر أكواد للغات', icon: 'Lang', bgColor: 'bg-purple-600' },
      { id: 'stats', arabicName: 'إحصائيات الزوار', description: 'عدد زوار الموقع الفعليين', icon: 'Users', bgColor: 'bg-pink-600' },
    ];

    // --- State Management ---
    let activeTool = null;
    let state = {};

    // --- Render Functions ---
    const renderGrid = () => {
      const grid = document.getElementById('grid-view');
      const toolView = document.getElementById('tool-view');
      grid.classList.remove('hidden');
      toolView.classList.add('hidden');
      
      grid.innerHTML = tools.map((tool, idx) => `
        <button onclick="setActiveTool('${tool.id}')" class="group text-right bg-slate-900/60 border border-slate-800 rounded-2xl p-6 hover:border-emerald-700/50 hover:bg-slate-900 transition-all duration-300 hover:shadow-lg hover:shadow-emerald-900/20">
          <div class="w-12 h-12 rounded-xl ${tool.bgColor} flex items-center justify-center mb-4 shadow-lg group-hover:scale-110 transition-transform text-white">
            ${icons[tool.icon]}
          </div>
          <h3 class="text-lg font-bold text-white mb-1 font-serif">${tool.arabicName}</h3>
          <p class="text-sm text-slate-400 mb-3">${tool.description}</p>
          <div class="flex items-center gap-1 text-emerald-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>افتح الأداة</span>
          </div>
        </button>
      `).join('');
    };

    const setActiveTool = (id) => {
      activeTool = id;
      const tool = tools.find(t => t.id === id);
      const grid = document.getElementById('grid-view');
      const toolView = document.getElementById('tool-view');
      
      grid.classList.add('hidden');
      toolView.classList.remove('hidden');
      
      toolView.innerHTML = `
        <div class="flex items-center gap-3 mb-8">
          <button onclick="renderGrid()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-colors text-sm text-slate-300">
            <span>→</span>
            <span>رجوع</span>
          </button>
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl ${tool.bgColor} flex items-center justify-center shadow-lg text-white">
              ${icons[tool.icon]}
            </div>
            <h2 class="text-2xl font-bold text-white font-serif">${tool.arabicName}</h2>
          </div>
        </div>
        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-xl" id="tool-content">
          ${renderToolContent(id)}
        </div>
      `;
      
      initToolLogic(id);
    };

    const renderToolContent = (id) => {
      switch(id) {
        case 'password': return `
          <div class="space-y-6">
            <div class="relative">
              <input id="pwd-output" readonly class="bg-slate-800 border-slate-700 text-white text-xl font-mono pr-4 pl-24 h-14 w-full rounded-xl border" />
              <div class="absolute top-1/2 -translate-y-1/2 left-2 flex gap-2">
                <button onclick="copyToClipboard(document.getElementById('pwd-output').value, 'تم نسخ كلمة السر')" class="p-2 hover:bg-slate-700 rounded-lg text-emerald-400">${icons.Copy}</button>
                <button onclick="generatePassword()" class="p-2 hover:bg-slate-700 rounded-lg text-slate-300">${icons.Refresh}</button>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-sm text-slate-400">القوة:</span>
              <div class="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden"><div id="pwd-strength" class="h-full bg-emerald-500 transition-all" style="width: 0%"></div></div>
              <span id="pwd-strength-label" class="text-sm font-bold text-white">ضعيفة</span>
            </div>
            <div class="space-y-4">
              <div>
                <div class="flex justify-between mb-2">
                  <label class="text-slate-300">طول كلمة السر</label>
                  <span id="pwd-length-val" class="text-emerald-400 font-mono font-bold">16</span>
                </div>
                <input id="pwd-length" type="range" min="4" max="64" value="16" class="w-full accent-emerald-500" oninput="state.length=Number(this.value); document.getElementById('pwd-length-val').innerText=this.value; generatePassword()" />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="flex items-center gap-2"><input type="checkbox" id="pwd-upper" checked class="accent-emerald-500" onchange="state.uppercase=this.checked; generatePassword()" /><label for="pwd-upper">أحرف كبيرة (A-Z)</label></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="pwd-lower" checked class="accent-emerald-500" onchange="state.lowercase=this.checked; generatePassword()" /><label for="pwd-lower">أحرف صغيرة (a-z)</label></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="pwd-num" checked class="accent-emerald-500" onchange="state.numbers=this.checked; generatePassword()" /><label for="pwd-num">أرقام (0-9)</label></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="pwd-sym" checked class="accent-emerald-500" onchange="state.symbols=this.checked; generatePassword()" /><label for="pwd-sym">رموز (!@#$)</label></div>
              </div>
            </div>
            <button onclick="generatePassword()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl flex items-center justify-center gap-2">${icons.Refresh} توليد كلمة سر جديدة</button>
          </div>`;
          
        case 'qrcode': return `
          <div class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
              <div class="space-y-4">
                <div><label class="text-slate-300 mb-2 block">النص أو الرابط</label><textarea id="qr-text" class="bg-slate-800 border-slate-700 text-white min-h-[120px] w-full rounded-xl border p-3" placeholder="أدخل النص أو الرابط...">https://example.com</textarea></div>
                <div><label class="text-slate-300 mb-2 block">الحجم (بكسل)</label><input id="qr-size" type="number" value="256" class="bg-slate-800 border-slate-700 text-white w-full rounded-xl border p-2" /></div>
                <button onclick="downloadQR()" class="w-full border-slate-700 text-slate-200 hover:bg-slate-800 py-3 rounded-xl border flex items-center justify-center gap-2">${icons.Copy} تحميل SVG</button>
              </div>
              <div id="qr-preview" class="flex items-center justify-center bg-slate-800/50 border border-slate-700 rounded-xl p-6 min-h-[300px]"></div>
            </div>
          </div>`;
          
        case 'base64': return `
          <div class="space-y-6">
            <div class="flex gap-2">
              <button id="b64-enc-btn" onclick="state.mode='encode'; updateB64UI()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg">تشفير</button>
              <button id="b64-dec-btn" onclick="state.mode='decode'; updateB64UI()" class="bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg">فك التشفير</button>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
              <div><label class="text-sm text-slate-400 mb-2 block">المدخل</label><textarea id="b64-input" class="bg-slate-800 border-slate-700 text-white min-h-[200px] w-full rounded-xl border p-3 font-mono" placeholder="أدخل النص..."></textarea></div>
              <div><label class="text-sm text-slate-400 mb-2 block">النتيجة</label><textarea id="b64-output" readonly class="bg-slate-800 border-slate-700 text-white min-h-[200px] w-full rounded-xl border p-3 font-mono"></textarea></div>
            </div>
            <div class="flex gap-2">
              <button onclick="convertB64()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">${icons.Refresh} تحويل</button>
              <button onclick="copyToClipboard(document.getElementById('b64-output').value)" class="border-slate-700 text-slate-200 hover:bg-slate-800 px-4 py-2 rounded-lg border flex items-center gap-2">${icons.Copy} نسخ</button>
            </div>
          </div>`;
          
        case 'hash': return `
          <div class="space-y-6">
            <div><label class="text-slate-300 mb-2 block">النص</label><input id="hash-input" oninput="generateHash()" class="bg-slate-800 border-slate-700 text-white h-12 w-full rounded-xl border p-3" placeholder="أدخل النص لإنشاء الهاش..." /></div>
            <div id="hash-output" class="space-y-4"></div>
          </div>`;
          
        case 'formatter': return `
          <div class="space-y-6">
            <div class="grid md:grid-cols-2 gap-4">
              <div><label class="text-sm text-slate-400 mb-2 block">الكود الأصلي</label><textarea id="fmt-input" class="bg-slate-800 border-slate-700 text-white min-h-[250px] w-full rounded-xl border p-3 font-mono text-sm" placeholder="ألصق الكود هنا..."></textarea></div>
              <div><label class="text-sm text-slate-400 mb-2 block">الكود المنسق</label><textarea id="fmt-output" readonly class="bg-slate-800 border-slate-700 text-white min-h-[250px] w-full rounded-xl border p-3 font-mono text-sm"></textarea></div>
            </div>
            <p id="fmt-error" class="text-red-400 text-sm hidden"></p>
            <div class="flex gap-2">
              <button onclick="formatCode()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">${icons.Code} تنسيق</button>
              <button onclick="copyToClipboard(document.getElementById('fmt-output').value)" class="border-slate-700 text-slate-200 hover:bg-slate-800 px-4 py-2 rounded-lg border flex items-center gap-2">${icons.Copy} نسخ</button>
            </div>
          </div>`;
          
        case 'color': return `
          <div class="space-y-6">
            <div class="flex flex-col md:flex-row gap-6">
              <div class="flex-1">
                <label class="text-slate-300 mb-2 block">اختر اللون</label>
                <div class="flex items-center gap-4">
                  <input id="color-picker" type="color" value="#10b981" oninput="updateColor(this.value)" class="w-20 h-20 rounded-xl cursor-pointer bg-transparent border-2 border-slate-700" />
                  <input id="color-hex" value="#10b981" oninput="updateColor(this.value)" class="bg-slate-800 border-slate-700 text-white font-mono text-lg w-full rounded-xl border p-2" />
                </div>
              </div>
              <div id="color-preview" class="w-full md:w-48 h-32 rounded-xl border border-slate-700 shadow-lg" style="background-color: #10b981"></div>
            </div>
            <div id="color-formats" class="space-y-3"></div>
          </div>`;
          
        case 'lorem': return `
          <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
              <div><label class="text-slate-300 mb-2 block">عدد الفقرات</label><input id="lorem-p" type="number" min="1" max="20" value="3" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white" /></div>
              <div><label class="text-slate-300 mb-2 block">الكلمات لكل فقرة</label><input id="lorem-w" type="number" min="10" max="200" value="50" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white" /></div>
            </div>
            <button onclick="generateLorem()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl flex items-center justify-center gap-2">${icons.Type} توليد النص</button>
            <textarea id="lorem-output" readonly class="bg-slate-800 border-slate-700 text-white min-h-[200px] w-full rounded-xl border p-3"></textarea>
            <button onclick="copyToClipboard(document.getElementById('lorem-output').value)" class="w-full border-slate-700 text-slate-200 hover:bg-slate-800 py-3 rounded-xl border flex items-center justify-center gap-2">${icons.Copy} نسخ النص</button>
          </div>`;
          
        case 'url': return `
          <div class="space-y-6">
            <div class="flex gap-2">
              <button id="url-enc-btn" onclick="state.mode='encode'; updateUrlUI()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg">تشفير</button>
              <button id="url-dec-btn" onclick="state.mode='decode'; updateUrlUI()" class="bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg">فك التشفير</button>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
              <div><label class="text-sm text-slate-400 mb-2 block">المدخل</label><textarea id="url-input" class="bg-slate-800 border-slate-700 text-white min-h-[200px] w-full rounded-xl border p-3 font-mono"></textarea></div>
              <div><label class="text-sm text-slate-400 mb-2 block">النتيجة</label><textarea id="url-output" readonly class="bg-slate-800 border-slate-700 text-white min-h-[200px] w-full rounded-xl border p-3 font-mono"></textarea></div>
            </div>
            <div class="flex gap-2">
              <button onclick="convertUrl()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">${icons.Refresh} تحويل</button>
              <button onclick="copyToClipboard(document.getElementById('url-output').value)" class="border-slate-700 text-slate-200 hover:bg-slate-800 px-4 py-2 rounded-lg border flex items-center gap-2">${icons.Copy} نسخ</button>
            </div>
          </div>`;
          
        case 'json': return `
          <div class="space-y-4">
            <textarea id="json-input" class="bg-slate-800 border-slate-700 text-white min-h-[150px] w-full rounded-xl border p-3 font-mono text-sm" placeholder="ألصق JSON هنا...">{\n  "name": "أحمد",\n  "age": 30,\n  "skills": ["React", "TypeScript"],\n  "active": true\n}</textarea>
            <button onclick="parseJSON()" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium">تحليل وعرض</button>
            <p id="json-error" class="text-red-400 text-sm hidden"></p>
            <div id="json-tree" class="bg-slate-800/50 border border-slate-700 rounded-xl p-4 font-mono text-sm overflow-auto max-h-[400px] scrollbar-thin"></div>
          </div>`;
          
        case 'text': return `
          <div class="space-y-6">
            <div id="text-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <textarea id="text-input" oninput="analyzeText()" class="bg-slate-800 border-slate-700 text-white min-h-[300px] w-full rounded-xl border p-3 text-lg leading-relaxed" placeholder="اكتب أو ألصق النص هنا لتحليله..."></textarea>
          </div>`;
          
        case 'learn': return `
          <div class="space-y-8">
            <div id="learn-tracks" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <div id="learn-content"></div>
          </div>`;
          
        case 'languages': return `
          <div class="space-y-6">
            <div id="lang-buttons" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            <div id="lang-editor"></div>
          </div>`;
          
        case 'stats': return `
          <div class="space-y-8">
            <div id="stats-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <div id="stats-info"></div>
          </div>`;
          
        default: return '<p>Tool not found</p>';
      }
    };

    // --- Tool Logic ---
    const initToolLogic = (id) => {
      switch(id) {
        case 'password':
          state = { length: 16, uppercase: true, lowercase: true, numbers: true, symbols: true };
          generatePassword();
          break;
        case 'qrcode':
          state = { text: 'https://example.com', size: 256 };
          generateQR();
          document.getElementById('qr-text').oninput = (e) => { state.text = e.target.value; generateQR(); };
          document.getElementById('qr-size').oninput = (e) => { state.size = Number(e.target.value); generateQR(); };
          break;
        case 'base64':
          state = { mode: 'encode' };
          updateB64UI();
          break;
        case 'hash':
          generateHash();
          break;
        case 'color':
          updateColor('#10b981');
          break;
        case 'lorem':
          break;
        case 'url':
          state = { mode: 'encode' };
          updateUrlUI();
          break;
        case 'json':
          parseJSON();
          break;
        case 'text':
          analyzeText();
          break;
        case 'learn':
          state = { activeTrack: 'frontend', completedSteps: {} };
          renderLearnHub();
          break;
        case 'languages':
          state = { activeLang: 'javascript' };
          renderLanguages();
          break;
        case 'stats':
          renderStats();
          break;
      }
    };

    const generatePassword = () => {
      let chars = "";
      if (state.uppercase) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (state.lowercase) chars += "abcdefghijklmnopqrstuvwxyz";
      if (state.numbers) chars += "0123456789";
      if (state.symbols) chars += "!@#$%^&*()_+-=[]{}|;:,.<>?";
      if (!chars) return document.getElementById('pwd-output').value = "";
      
      let pass = "";
      for (let i = 0; i < state.length; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
      document.getElementById('pwd-output').value = pass;
      
      let score = 0;
      if (state.length >= 12) score++;
      if (state.length >= 16) score++;
      if (state.uppercase && state.lowercase) score++;
      if (state.numbers) score++;
      if (state.symbols) score++;
      
      const labels = ["ضعيفة", "متوسطة", "جيدة", "قوية", "قوية جداً"];
      const colors = ["bg-red-500", "bg-orange-500", "bg-amber-500", "bg-emerald-500", "bg-teal-500"];
      document.getElementById('pwd-strength').style.width = `${(score / 5) * 100}%`;
      document.getElementById('pwd-strength').className = `h-full ${colors[Math.min(score, 4)]} transition-all`;
      document.getElementById('pwd-strength-label').innerText = labels[Math.min(score, 4)];
    };

    const generateQR = () => {
      const text = state.text || '';
      const size = state.size || 256;
      if (!text) return document.getElementById('qr-preview').innerHTML = '<p class="text-slate-500">أدخل نصاً لإنشاء QR Code</p>';
      
      const encoded = encodeURIComponent(text);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="white"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" fill="black">${encoded}</text></svg>`;
      document.getElementById('qr-preview').innerHTML = `<div class="text-center"><div class="mx-auto">${svg}</div><p class="text-xs text-slate-500 mt-2">معاينة QR Code</p></div>`;
      state.svg = svg;
    };

    const downloadQR = () => {
      const blob = new Blob([state.svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'qrcode.svg'; a.click();
      URL.revokeObjectURL(url);
    };

    const updateB64UI = () => {
      const encBtn = document.getElementById('b64-enc-btn');
      const decBtn = document.getElementById('b64-dec-btn');
      if (state.mode === 'encode') {
        encBtn.className = 'bg-emerald-600 text-white px-4 py-2 rounded-lg';
        decBtn.className = 'bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg';
      } else {
        encBtn.className = 'bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg';
        decBtn.className = 'bg-emerald-600 text-white px-4 py-2 rounded-lg';
      }
    };

    const convertB64 = () => {
      const input = document.getElementById('b64-input').value;
      try {
        if (state.mode === 'encode') document.getElementById('b64-output').value = btoa(unescape(encodeURIComponent(input)));
        else document.getElementById('b64-output').value = decodeURIComponent(escape(atob(input)));
      } catch (e) { document.getElementById('b64-output').value = "خطأ: نص غير صالح"; }
    };

    const generateHash = () => {
      const input = document.getElementById('hash-input').value;
      const container = document.getElementById('hash-output');
      if (!input) return container.innerHTML = '<p class="text-slate-500 text-center py-8">أدخل نصاً لإنشاء الهاش</p>';
      
      const simpleHash = (str, algo) => {
        let hash = 0;
        const seed = algo.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
        for (let i = 0; i < str.length; i++) {
          hash = ((hash << 5) - hash) + str.charCodeAt(i) + seed;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(16).padStart(8, '0');
      };
      
      const hashes = [
        { name: "SHA-1", value: simpleHash(input, "SHA-1").repeat(5).slice(0, 40) },
        { name: "SHA-256", value: simpleHash(input, "SHA-256").repeat(8).slice(0, 64) },
        { name: "SHA-512", value: simpleHash(input, "SHA-512").repeat(16).slice(0, 128) }
      ];
      
      container.innerHTML = hashes.map(h => `
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-bold text-emerald-400">${h.name}</span>
            <button onclick="copyToClipboard('${h.value}', 'تم نسخ ${h.name}')" class="p-1 hover:bg-slate-700 rounded">${icons.Copy}</button>
          </div>
          <p class="text-white font-mono text-sm break-all">${h.value}</p>
        </div>
      `).join('');
    };

    const formatCode = () => {
      const input = document.getElementById('fmt-input').value.trim();
      const errEl = document.getElementById('fmt-error');
      errEl.classList.add('hidden');
      try {
        let output = '';
        if (input.startsWith('{') || input.startsWith('[')) {
          output = JSON.stringify(JSON.parse(input), null, 2);
        } else {
          output = input; // Basic passthrough for HTML/CSS in this simple version
        }
        document.getElementById('fmt-output').value = output;
      } catch (e) {
        errEl.innerText = "خطأ في التنسيق: " + e.message;
        errEl.classList.remove('hidden');
      }
    };

    const hexToRgb = (hex) => {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    };

    const rgbToHsl = (r, g, b) => {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0, s = 0, l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    };

    const updateColor = (val) => {
      const rgb = hexToRgb(val) || { r: 0, g: 0, b: 0 };
      const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      document.getElementById('color-picker').value = val;
      document.getElementById('color-hex').value = val;
      document.getElementById('color-preview').style.backgroundColor = val;
      
      const formats = [
        { label: "HEX", value: val.toUpperCase() },
        { label: "RGB", value: `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})` },
        { label: "HSL", value: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)` }
      ];
      
      document.getElementById('color-formats').innerHTML = formats.map(f => `
        <div class="flex items-center justify-between bg-slate-800/50 border border-slate-700 rounded-xl p-4">
          <div><span class="text-xs text-emerald-400 font-bold">${f.label}</span><p class="text-white font-mono text-sm mt-1">${f.value}</p></div>
          <button onclick="copyToClipboard('${f.value}', 'تم نسخ ${f.label}')" class="p-2 rounded-lg hover:bg-slate-700">${icons.Copy}</button>
        </div>
      `).join('');
    };

    const generateLorem = () => {
      const p = Number(document.getElementById('lorem-p').value);
      const w = Number(document.getElementById('lorem-w').value);
      const words = ["lorem", "ipsum", "dolor", "sit", "amet", "consectetur", "adipiscing", "elit", "sed", "do", "eiusmod", "tempor", "incididunt", "ut", "labore", "et", "dolore", "magna", "aliqua", "enim", "ad", "minim", "veniam", "quis", "nostrud", "exercitation", "ullamco", "laboris", "nisi", "aliquip", "ex", "ea", "commodo", "consequat", "duis", "aute", "irure", "in", "reprehenderit", "voluptate", "velit", "esse", "cillum", "fugiat", "nulla", "pariatur", "excepteur", "sint", "occaecat", "cupidatat", "non", "proident", "sunt", "culpa", "qui", "officia"];
      const result = [];
      for (let i = 0; i < p; i++) {
        let para = [];
        for (let j = 0; j < w; j++) para.push(words[Math.floor(Math.random() * words.length)]);
        let s = para.join(' ');
        result.push(s.charAt(0).toUpperCase() + s.slice(1) + '.');
      }
      document.getElementById('lorem-output').value = result.join('\n\n');
    };

    const updateUrlUI = () => {
      const encBtn = document.getElementById('url-enc-btn');
      const decBtn = document.getElementById('url-dec-btn');
      if (state.mode === 'encode') {
        encBtn.className = 'bg-emerald-600 text-white px-4 py-2 rounded-lg';
        decBtn.className = 'bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg';
      } else {
        encBtn.className = 'bg-slate-800 text-slate-300 hover:bg-slate-700 px-4 py-2 rounded-lg';
        decBtn.className = 'bg-emerald-600 text-white px-4 py-2 rounded-lg';
      }
    };

    const convertUrl = () => {
      const input = document.getElementById('url-input').value;
      try {
        if (state.mode === 'encode') document.getElementById('url-output').value = encodeURIComponent(input);
        else document.getElementById('url-output').value = decodeURIComponent(input);
      } catch (e) { document.getElementById('url-output').value = "خطأ: رابط غير صالح"; }
    };

    const parseJSON = () => {
      const input = document.getElementById('json-input').value;
      const errEl = document.getElementById('json-error');
      const treeEl = document.getElementById('json-tree');
      try {
        const data = JSON.parse(input);
        errEl.classList.add('hidden');
        treeEl.innerHTML = '';
        const renderNode = (data, name, isLast, container) => {
          const type = Array.isArray(data) ? 'array' : typeof data;
          const isObj = type === 'object' || type === 'array';
          const div = document.createElement('div');
          div.className = 'py-0.5';
          
          if (!isObj) {
            let valHTML = '';
            if (data === null) valHTML = '<span class="text-red-400">null</span>';
            else if (typeof data === 'string') valHTML = `<span class="text-emerald-400">"${data}"</span>`;
            else if (typeof data === 'number') valHTML = `<span class="text-amber-400">${data}</span>`;
            else valHTML = `<span class="text-sky-400">${data}</span>`;
            div.innerHTML = `<div class="flex items-center gap-2">${name ? `<span class="text-violet-400">"${name}":</span>` : ''} ${valHTML} ${!isLast ? '<span class="text-slate-500">,</span>' : ''}</div>`;
            container.appendChild(div);
            return;
          }
          
          const entries = Object.entries(data);
          div.innerHTML = `<div class="flex items-center gap-1 cursor-pointer hover:bg-slate-800 rounded px-1"><span class="text-slate-400">▾</span>${name ? `<span class="text-violet-400">"${name}":</span>` : ''}<span class="text-slate-400">${type === 'array' ? '[' : '{'}</span></div>`;
          container.appendChild(div);
          const childContainer = document.createElement('div');
          childContainer.className = 'pr-4 border-r border-slate-700 mr-2';
          div.appendChild(childContainer);
          entries.forEach(([k, v], i) => renderNode(v, k, i === entries.length - 1, childContainer));
          const closeDiv = document.createElement('div');
          closeDiv.className = 'text-slate-400';
          closeDiv.innerHTML = `${type === 'array' ? ']' : '}'} ${!isLast ? '<span class="text-slate-500">,</span>' : ''}`;
          childContainer.appendChild(closeDiv);
        };
        renderNode(data, null, true, treeEl);
      } catch (e) {
        errEl.innerText = "JSON غير صالح: " + e.message;
        errEl.classList.remove('hidden');
        treeEl.innerHTML = '';
      }
    };

    const analyzeText = () => {
      const text = document.getElementById('text-input').value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const characters = text.length;
      const charactersNoSpaces = text.replace(/\s/g, "").length;
      const sentences = text.trim() ? text.split(/[.!?؟]+/).filter(s => s.trim().length > 0).length : 0;
      const lines = text.trim() ? text.split(/\n/).length : 0;
      const readingTime = Math.ceil(words / 200);
      
      const stats = [
        { label: "الكلمات", value: words, color: "text-emerald-400" },
        { label: "الحروف", value: characters, color: "text-teal-400" },
        { label: "بدون مسافات", value: charactersNoSpaces, color: "text-cyan-400" },
        { label: "الجمل", value: sentences, color: "text-sky-400" },
        { label: "الأسطر", value: lines, color: "text-indigo-400" },
        { label: "دقيقة قراءة", value: readingTime, color: "text-fuchsia-400" },
      ];
      
      document.getElementById('text-stats').innerHTML = stats.map(s => `
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
          <span class="text-xs text-slate-400 block mb-1">${s.label}</span>
          <p class="text-2xl font-bold text-white font-mono ${s.color}">${s.value}</p>
        </div>
      `).join('');
    };

    const tracks = [
      { id: "frontend", title: "تطوير الواجهات الأمامية", icon: "💻", color: "bg-sky-500", description: "تعلم بناء واجهات مستخدم تفاعلية باستخدام HTML, CSS, JavaScript, React", steps: ["تعلم أساسيات HTML5 والوسوم الدلالية", "احتراف CSS3 و Flexbox و Grid", "تعلم JavaScript الحديثة (ES6+)", "إتقان مكتبة React.js", "تعلم أدوات البناء مثل Vite و Webpack", "التعمق في TypeScript"] },
      { id: "backend", title: "تطوير الواجهات الخلفية", icon: "⚙️", color: "bg-emerald-500", description: "بناء خوادم و APIs قوية باستخدام Node.js و Express أو Python", steps: ["أساسيات البرمجة من جانب الخادم", "تعلم Node.js و Express أو Django", "إنشاء RESTful APIs", "التعامل مع قواعد البيانات (SQL/NoSQL)", "المصادقة والتفويض (JWT, OAuth)", "نشر التطبيقات على Heroku أو Vercel"] },
      { id: "mobile", title: "تطوير تطبيقات الموبايل", icon: "📱", color: "bg-violet-500", description: "بناء تطبيقات iOS و Android باستخدام React Native أو Flutter", steps: ["أساسيات React.js", "تعلم React Native أو Flutter", "إدارة الحالة (Redux, Riverpod)", "التعامل مع APIs في التطبيقات", "استخدام إمكانيات الجهاز (الكاميرا، الموقع)", "نشر التطبيق على App Store و Google Play"] },
      { id: "ai", title: "الذكاء الاصطناعي والبيانات", icon: "🧠", color: "bg-amber-500", description: "ادخل عالم تعلم الآلة وعلوم البيانات بلغة Python", steps: ["تعلم لغة Python والإحصاء الأساسي", "تعلم مكتبات Pandas و NumPy", "أساسيات تعلم الآلة (Scikit-Learn)", "التعلم العميق باستخدام TensorFlow أو PyTorch", "معالجة اللغات الطبيعية (NLP)", "بناء ونشر نماذج الذكاء الاصطناعي"] },
    ];

    const renderLearnHub = () => {
      document.getElementById('learn-tracks').innerHTML = tracks.map(t => `
        <button onclick="state.activeTrack='${t.id}'; renderLearnContent()" class="p-4 rounded-xl border transition-all text-right ${state.activeTrack === t.id ? 'bg-slate-800 border-emerald-500 shadow-lg' : 'bg-slate-800/50 border-slate-700 hover:border-slate-600'}">
          <div class="text-3xl mb-2">${t.icon}</div>
          <h3 class="font-bold text-white text-sm">${t.title}</h3>
        </button>
      `).join('');
      renderLearnContent();
    };

    const renderLearnContent = () => {
      const track = tracks.find(t => t.id === state.activeTrack);
      const progress = Math.round((track.steps.filter(s => state.completedSteps[s]).length / track.steps.length) * 100);
      document.getElementById('learn-tracks').innerHTML = tracks.map(t => `
        <button onclick="state.activeTrack='${t.id}'; renderLearnContent()" class="p-4 rounded-xl border transition-all text-right ${state.activeTrack === t.id ? 'bg-slate-800 border-emerald-500 shadow-lg' : 'bg-slate-800/50 border-slate-700 hover:border-slate-600'}">
          <div class="text-3xl mb-2">${t.icon}</div>
          <h3 class="font-bold text-white text-sm">${t.title}</h3>
        </button>
      `).join('');
      document.getElementById('learn-content').innerHTML = `
        <div class="bg-slate-800/30 border border-slate-700 rounded-2xl p-6">
          <div class="flex items-start gap-4 mb-6">
            <div class="text-4xl">${track.icon}</div>
            <div><h3 class="text-xl font-bold text-white mb-1">${track.title}</h3><p class="text-slate-400 text-sm">${track.description}</p></div>
          </div>
          <div class="mb-6">
            <div class="flex justify-between text-sm mb-2"><span class="text-slate-300">التقدم</span><span class="text-emerald-400 font-bold">${progress}%</span></div>
            <div class="h-2 bg-slate-700 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-l from-emerald-500 to-teal-400 transition-all" style="width: ${progress}%"></div></div>
          </div>
          <div class="space-y-3">
            ${track.steps.map((step, idx) => `
              <button onclick="toggleStep('${step}')" class="w-full flex items-center gap-3 p-3 rounded-lg bg-slate-900/50 hover:bg-slate-900 border border-slate-800 transition-colors text-right">
                ${state.completedSteps[step] ? `<span class="text-emerald-400">${icons.Check}</span>` : `<span class="text-slate-600">${icons.Circle}</span>`}
                <span class="text-sm ${state.completedSteps[step] ? 'text-slate-500 line-through' : 'text-slate-200'}">${idx + 1}. ${step}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    };

    const toggleStep = (step) => {
      state.completedSteps[step] = !state.completedSteps[step];
      renderLearnContent();
    };

    const languages = [
      { id: "javascript", name: "JavaScript", icon: "🟨", color: "bg-yellow-500", description: "لغة الويب الأساسية لبناء التفاعلات", snippet: `// مرحباً بالعالم\nconsole.log("Hello, World!");\n\n// دالة جمع\nfunction add(a, b) {\n  return a + b;\n}\nconsole.log(add(5, 3));`, playground: "https://playcode.io/javascript" },
      { id: "python", name: "Python", icon: "🐍", color: "bg-blue-500", description: "لغة قوية للذكاء الاصطناعي وتحليل البيانات", snippet: `# مرحباً بالعالم\nprint("Hello, World!")\n\n# دالة جمع\ndef add(a, b):\n    return a + b\n\nprint(add(5, 3))`, playground: "https://www.online-python.com/" },
      { id: "html", name: "HTML", icon: "🌐", color: "bg-orange-500", description: "اللغة الأساسية لبناء صفحات الويب", snippet: `<!DOCTYPE html>\n<html>\n<head>\n  <title>صفحتي</title>\n</head>\n<body>\n  <h1>مرحباً بالعالم!</h1>\n  <p>هذه فقرة.</p>\n</body>\n</html>`, playground: "https://playcode.io/html" },
      { id: "css", name: "CSS", icon: "🎨", color: "bg-sky-500", description: "لغة تنسيق الصفحات والتصميم", snippet: `body {\n  background-color: #f0f0f0;\n  font-family: Arial, sans-serif;\n}\n\nh1 {\n  color: #333;\n  text-align: center;\n}`, playground: "https://playcode.io/css" },
      { id: "typescript", name: "TypeScript", icon: "🔷", color: "bg-blue-600", description: "نسخة مطورة من JavaScript مع أنواع ثابتة", snippet: `// مرحباً بالعالم\nconst message: string = "Hello, World!";\nconsole.log(message);\n\n// دالة مع أنواع\nfunction add(a: number, b: number): number {\n  return a + b;\n}\nconsole.log(add(5, 3));`, playground: "https://www.typescriptlang.org/play" },
      { id: "java", name: "Java", icon: "☕", color: "bg-red-500", description: "لغة قوية لتطبيقات المؤسسات والأندرويد", snippet: `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, World!");\n    }\n}`, playground: "https://www.onlinegdb.com/online_java_compiler" },
    ];

    const renderLanguages = () => {
      document.getElementById('lang-buttons').innerHTML = languages.map(l => `
        <button onclick="selectLang('${l.id}')" class="flex items-center gap-3 p-3 rounded-xl border transition-all text-right ${state.activeLang === l.id ? 'bg-slate-800 border-emerald-500 shadow-lg' : 'bg-slate-800/50 border-slate-700 hover:border-slate-600'}">
          <span class="text-2xl">${l.icon}</span>
          <div><h3 class="font-bold text-white text-sm">${l.name}</h3><p class="text-xs text-slate-400 line-clamp-1">${l.description}</p></div>
        </button>
      `).join('');
      renderLangEditor();
    };

    const selectLang = (id) => {
      state.activeLang = id;
      renderLanguages();
    };

    const renderLangEditor = () => {
      const lang = languages.find(l => l.id === state.activeLang);
      document.getElementById('lang-editor').innerHTML = `
        <div class="space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center gap-2"><span class="text-2xl">${lang.icon}</span><h3 class="text-xl font-bold text-white">${lang.name}</h3></div>
            <div class="flex gap-2">
              <button onclick="runCode()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-sm flex items-center gap-1">${icons.Play} تشغيل</button>
              <button onclick="copyToClipboard(document.getElementById('lang-code').value, 'تم نسخ الكود')" class="border-slate-700 text-slate-200 hover:bg-slate-800 px-3 py-1.5 rounded-lg text-sm border flex items-center gap-1">${icons.Copy} نسخ</button>
              <a href="${lang.playground}" target="_blank"><button class="border-slate-700 text-slate-200 hover:bg-slate-800 px-3 py-1.5 rounded-lg text-sm border flex items-center gap-1">${icons.Ext} محرر خارجي</button></a>
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-4">
            <div><label class="text-sm text-slate-400 mb-2 flex items-center gap-1.5">${icons.Code} محرر الكود</label><textarea id="lang-code" dir="ltr" class="bg-slate-950 border-slate-700 text-emerald-300 min-h-[300px] w-full rounded-xl border p-3 font-mono text-sm leading-relaxed scrollbar-thin">${lang.snippet}</textarea></div>
            <div><label class="text-sm text-slate-400 mb-2 flex items-center gap-1.5">${icons.Play} المخرجات</label><textarea id="lang-output" readonly dir="ltr" class="bg-slate-950 border-slate-700 text-slate-300 min-h-[300px] w-full rounded-xl border p-3 font-mono text-sm leading-relaxed scrollbar-thin"></textarea></div>
          </div>
          <div class="bg-slate-800/30 border border-slate-700 rounded-xl p-4"><h4 class="text-sm font-bold text-white mb-2">حول ${lang.name}</h4><p class="text-sm text-slate-400">${lang.description}</p></div>
        </div>
      `;
    };

    const runCode = () => {
      const lang = languages.find(l => l.id === state.activeLang);
      const code = document.getElementById('lang-code').value;
      const out = document.getElementById('lang-output');
      if (lang.id === 'javascript' || lang.id === 'typescript') {
        try {
          const logs = [];
          const mockConsole = { log: (...args) => logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')) };
          const jsCode = lang.id === 'typescript' ? code.replace(/:\s*(string|number|boolean|any|void)/g, '').replace(/interface\s+\w+\s*{[^}]*}/g, '') : code;
          new Function('console', jsCode)(mockConsole);
          out.value = logs.join('\n') || "تم تنفيذ الكود بنجاح (لا يوجد مخرجات)";
        } catch (e) { out.value = "خطأ: " + e.message; }
      } else {
        out.value = "التشغيل المباشر متاح فقط لـ JavaScript و TypeScript. يمكنك استخدام المحرر الخارجي للغات الأخرى.";
      }
    };

    const renderStats = () => {
      const STORAGE_KEY = "visitor_stats_v1";
      const now = new Date();
      const today = now.toDateString();
      const stored = localStorage.getItem(STORAGE_KEY);
      let data = { totalVisits: 0, lastVisitDate: "", todayVisits: 0, currentSessionStart: Date.now() };
      if (stored) { try { data = JSON.parse(stored); } catch (e) {} }
      data.totalVisits += 1;
      if (data.lastVisitDate !== today) { data.todayVisits = 1; data.lastVisitDate = today; } else { data.todayVisits += 1; }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      
      const updateStatsUI = (sessionTime) => {
        const cards = [
          { label: "إجمالي الزيارات", value: data.totalVisits, icon: 'Users', color: "text-emerald-400", bg: "bg-emerald-500/10" },
          { label: "زيارات اليوم", value: data.todayVisits, icon: 'Trend', color: "text-teal-400", bg: "bg-teal-500/10" },
          { label: "مدة الجلسة", value: sessionTime, icon: 'Clock', color: "text-cyan-400", bg: "bg-cyan-500/10" },
          { label: "الحالة", value: "متصل", icon: 'Act', color: "text-sky-400", bg: "bg-sky-500/10" },
        ];
        document.getElementById('stats-cards').innerHTML = cards.map(c => `
          <div class="relative overflow-hidden border border-slate-700 rounded-2xl p-6 ${c.bg}">
            <div class="flex items-center justify-between mb-4"><span class="text-sm text-slate-300">${c.label}</span><span class="${c.color}">${icons[c.icon]}</span></div>
            <p class="text-3xl font-bold text-white font-mono">${c.value}</p>
          </div>
        `).join('');
      };
      
      const formatTime = (s) => `${Math.floor(s/60)}د ${s%60}ث`;
      let sessionSeconds = 0;
      updateStatsUI(formatTime(0));
      setInterval(() => { sessionSeconds++; updateStatsUI(formatTime(sessionSeconds)); }, 1000);
      
      const browser = navigator.userAgent.match(/(chrome|safari|firefox|edge|opera)/i)?.[0] || "غير معروف";
      const os = navigator.userAgent.match(/(windows|mac|linux|android|ios)/i)?.[0] || "غير معروف";
      document.getElementById('stats-info').innerHTML = `
        <div class="bg-slate-800/30 border border-slate-700 rounded-2xl p-6">
          <h3 class="text-lg font-bold text-white mb-4">معلومات إضافية</h3>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between items-center pb-3 border-b border-slate-700"><span class="text-slate-400">المتصفح</span><span class="text-white font-mono capitalize">${browser}</span></div>
            <div class="flex justify-between items-center pb-3 border-b border-slate-700"><span class="text-slate-400">نظام التشغيل</span><span class="text-white font-mono capitalize">${os}</span></div>
            <div class="flex justify-between items-center pb-3 border-b border-slate-700"><span class="text-slate-400">دقة الشاشة</span><span class="text-white font-mono">${window.screen.width} × ${window.screen.height}</span></div>
            <div class="flex justify-between items-center"><span class="text-slate-400">اللغة</span><span class="text-white font-mono">${navigator.language}</span></div>
          </div>
        </div>
        <div class="bg-emerald-950/30 border border-emerald-800/50 rounded-xl p-4 flex items-start gap-3 mt-6">
          <span class="text-emerald-400 shrink-0 mt-0.5">${icons.Act}</span>
          <p class="text-sm text-emerald-200">يتم حساب الزيارات محلياً على جهازك باستخدام Local Storage. كل مرة تفتح فيها الموقع تُحسب كزيارة جديدة.</p>
        </div>
      `;
    };

    // --- Init ---
    renderGrid();
  </script>
</body>
</html>
