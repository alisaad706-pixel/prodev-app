  <script>
    // ═══════════════════════════════════════════════
    // i18n
    // ═══════════════════════════════════════════════
    let currentLang = localStorage.getItem('prodev_lang') || 'ar';

    const NAV_ITEMS = [
      { id: "home", ar: "🏠 الرئيسية", en: "🏠 Home" },
      { id: "tools", ar: "🛠️ الأدوات", en: "🛠️ Tools" },
      { id: "learn", ar: "🎓 تعلم البرمجة", en: "🎓 Learn to Code" },
      { id: "snippets", ar: "📄 مقتطفات", en: "📄 Snippets" },
      { id: "colors", ar: "🎨 ألوان", en: "🎨 Colors" },
      { id: "resources", ar: "📚 مصادر", en: "📚 Resources" }
    ];

    const T = {
      tagline: { ar: "مركز أدوات المطور", en: "Developer Tools Hub" },
      botLabel: { ar: "بوت تليجرام متاح", en: "Telegram Bot Available" },
      footer: { ar: "ProDev Hub — مرجعك البرمجي المتكامل © 2026", en: "ProDev Hub — Your Complete Dev Reference © 2026" },
      visitorsLabel: { ar: "👁️ زوار الموقع (عداد حقيقي)", en: "👁️ Site Visitors (real counter)" },
      heroTag: { ar: "منصة شاملة للمطورين", en: "An all-in-one platform for developers" },
      heroTitle1: { ar: "كل ما يحتاجه المبرمج", en: "Everything a developer needs" },
      heroTitle2: { ar: "في مكان واحد", en: "in one place" },
      heroDesc: { ar: "29 أداة تفاعلية، مقتطفات برمجية، لوحات ألوان، وخرائط تعلّم كاملة من الصفر للاحتراف — كل ما تحتاجه في رحلتك البرمجية.", en: "29 interactive tools, code snippets, color palettes, and complete learning roadmaps from zero to hero — everything you need on your coding journey." },
      heroBtn1: { ar: "ابدأ الاستكشاف →", en: "Start Exploring →" },
      heroBtn2: { ar: "تعلّم البرمجة", en: "Learn to Code" },
      sectionsTitle: { ar: "أقسام الموقع", en: "Site Sections" },
      copy: { ar: "نسخ", en: "Copy" },
      copied: { ar: "✅ تم النسخ بنجاح!", en: "✅ Copied successfully!" },
      back: { ar: "→ رجوع", en: "← Back" },
    };

    function t(key) { return T[key] ? T[key][currentLang] : key; }

    function toggleLang() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('prodev_lang', currentLang);
      applyLangToDocument();
      buildNav();
      document.getElementById('header-tagline').textContent = t('tagline');
      document.getElementById('header-bot-label').textContent = t('botLabel');
      document.getElementById('footer-text').textContent = t('footer');
      navigate(currentSection);
    }

    function applyLangToDocument() {
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('lang-toggle-label').textContent = currentLang === 'ar' ? 'EN' : 'AR';
    }

    let currentSection = "home";

    function init() {
      applyLangToDocument();
      document.getElementById('header-tagline').textContent = t('tagline');
      document.getElementById('header-bot-label').textContent = t('botLabel');
      document.getElementById('footer-text').textContent = t('footer');
      buildNav();
      navigate("home");
    }

    function buildNav() {
      const html = NAV_ITEMS.map(item => `
        <button onclick="navigate('${item.id}')" class="nav-btn flex items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition-colors text-slate-600 hover:bg-slate-100 hover:text-slate-900" data-section="${item.id}">
          ${item[currentLang]}
        </button>
      `).join("");
      document.getElementById("desktop-nav").innerHTML = html;
      document.getElementById("mobile-nav").innerHTML = html;
    }

    function navigate(section) {
      currentSection = section;
      const content = document.getElementById("content");
      content.classList.remove("fade-in");
      void content.offsetWidth;
      content.classList.add("fade-in");

      document.querySelectorAll(".nav-btn").forEach(btn => {
        if (btn.dataset.section === section) {
          btn.classList.add("bg-teal-50", "text-teal-700");
          btn.classList.remove("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        } else {
          btn.classList.remove("bg-teal-50", "text-teal-700");
          btn.classList.add("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        }
      });

      const renderers = { home: renderHome, tools: renderTools, learn: renderLearn, snippets: renderSnippets, colors: renderColors, resources: renderResources };
      content.innerHTML = renderers[section] ? renderers[section]() : renderHome();

      window.scrollTo({ top: 0, behavior: "smooth" });
      if (section === "tools") openToolCategory('data');
      if (section === "learn") learnBackToTracks();
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.remove("hidden");
      toast.classList.add("toast");
      setTimeout(() => {
        toast.classList.add("hidden");
        toast.classList.remove("toast");
      }, 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast(t('copied')));
    }

    function renderHome() {
      const features = [
        { section: "tools", emoji: "🛠️", title: {ar:"أدوات ذكية", en:"Smart Tools"}, desc: {ar:"29 أداة برمجية تفاعلية: JSON، Base64، Regex، QR، وأكتر", en:"29 interactive dev tools: JSON, Base64, Regex, QR, and more"}, color: "from-teal-500 to-emerald-500" },
        { section: "learn", emoji: "🎓", title: {ar:"تعلم البرمجة", en:"Learn to Code"}, desc: {ar:"خرائط طريق كاملة من الصفر للاحتراف في 5 مسارات", en:"Complete zero-to-hero roadmaps across 5 tracks"}, color: "from-sky-500 to-blue-500" },
        { section: "snippets", emoji: "📄", title: {ar:"مقتطفات جاهزة", en:"Ready Snippets"}, desc: {ar:"مكتبة من المقتطفات البرمجية الجاهزة للاستخدام", en:"A library of ready-to-use code snippets"}, color: "from-amber-500 to-orange-500" },
        { section: "colors", emoji: "🎨", title: {ar:"لوحات ألوان", en:"Color Palettes"}, desc: {ar:"لوحات ألوان منسّقة ومحوّل ألوان لإلهام تصميمك", en:"Curated palettes and a color converter for your designs"}, color: "from-rose-500 to-pink-500" },
        { section: "resources", emoji: "📚", title: {ar:"مصادر تعلّم", en:"Learning Resources"}, desc: {ar:"روابط لأهم المراجع ومقتطفات مرجعية سريعة", en:"Links to the best references and quick cheatsheets"}, color: "from-indigo-500 to-violet-500" }
      ];

      return `
        <div class="space-y-10">
          <section class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-teal-700 via-teal-600 to-emerald-600 p-8 shadow-xl shadow-teal-600/20 sm:p-12">
            <div class="absolute -left-20 -top-20 h-64 w-64 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-24 -right-10 h-72 w-72 rounded-full bg-emerald-300/20 blur-3xl"></div>
            <div class="relative">
              <span class="mb-4 inline-flex items-center gap-1 rounded-full border border-white/20 bg-white/10 px-3 py-1 text-xs text-teal-50">${t('heroTag')}</span>
              <h1 class="text-3xl font-bold leading-tight text-white sm:text-4xl md:text-5xl">
                ${t('heroTitle1')}<br>
                <span class="text-emerald-200">${t('heroTitle2')}</span>
              </h1>
              <p class="mt-4 max-w-xl text-base leading-relaxed text-teal-50/90 sm:text-lg">
                ${t('heroDesc')}
              </p>
              <div class="mt-6 flex flex-wrap gap-3">
                <button onclick="navigate('tools')" class="rounded-xl bg-white px-6 py-3 text-sm font-semibold text-teal-700 shadow-sm transition hover:bg-teal-50">${t('heroBtn1')}</button>
                <button onclick="navigate('learn')" class="rounded-xl border border-white/30 bg-transparent px-6 py-3 text-sm font-semibold text-white transition hover:bg-white/10">${t('heroBtn2')}</button>
              </div>
            </div>
          </section>

          <section>
            <div class="mb-4 flex items-center gap-2">
              <h2 class="text-xl font-bold text-slate-800">${t('sectionsTitle')}</h2>
            </div>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
              ${features.map(f => `
                <button onclick="navigate('${f.section}')" class="group text-right">
                  <div class="h-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-lg">
                    <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br ${f.color} shadow-md text-xl">
                      ${f.emoji}
                    </div>
                    <div class="flex items-center justify-between text-lg font-bold">
                      ${f.title[currentLang]}
                      <svg class="h-4 w-4 text-slate-400 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                    <p class="mt-1 text-sm leading-relaxed text-slate-500">${f.desc[currentLang]}</p>
                  </div>
                </button>
              `).join("")}
            </div>
          </section>

          <section class="rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-sm">
            <p class="text-sm text-slate-500 mb-2">${t('visitorsLabel')}</p>
            <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Falisaad706-pixel.github.io%2Fprodev-app%2F&label=%D8%A7%D9%84%D8%B2%D9%88%D8%A7%D8%B1&icon=eye-fill&color=%230d9488" alt="visitors" height="28" class="mx-auto">
          </section>
        </div>
      `;
    }
const LEARN_CONTENT = {
  "python": {
    "beginner": {
      "ar": "🌱 <b>بايثون - المستوى المبتدئ</b>\n\n1️⃣ <b>التثبيت والإعداد:</b> نزّل بايثون من python.org وثبّت VS Code كمحرر أكواد. شغّل <code>python --version</code> في الـ terminal للتأكد إنه اتثبت صح.\n\n2️⃣ <b>المتغيرات وأنواع البيانات:</b> المتغير هو اسم بيخزن قيمة، زي <code>age = 25</code>. الأنواع الأساسية: <code>int</code> (أرقام صحيحة)، <code>float</code> (أرقام عشرية)، <code>str</code> (نصوص)، <code>bool</code> (True/False).\n\n3️⃣ <b>العمليات والمقارنات:</b> <code>+ - * /</code> للحساب، و<code>== != &gt; &lt;</code> للمقارنة. بايثون بيفرّق بين <code>=</code> (تخزين قيمة) و<code>==</code> (مقارنة).\n\n4️⃣ <b>الشروط:</b> <code>if condition:</code> تنفّذ كود لو الشرط صح، و<code>elif</code> لشروط إضافية، و<code>else</code> للحالة الافتراضية.\n\n5️⃣ <b>الحلقات:</b> <code>for item in list:</code> بتكرر على عناصر قائمة، و<code>while condition:</code> بتكرر طالما الشرط صح. احذر من الحلقات اللي متنتهيش (infinite loops).\n\n6️⃣ <b>القوائم والقواميس:</b> <code>list = [1,2,3]</code> تخزن عناصر مرتبة، و<code>dict = {'key':'value'}</code> تخزن أزواج مفتاح-قيمة. استخدم <code>.append()</code> لإضافة عنصر لقائمة.\n\n7️⃣ <b>الدوال:</b> <code>def greet(name):</code> بتعرّف دالة تقدر تستدعيها بأسماء مختلفة بدل تكرار الكود. استخدم <code>return</code> لإرجاع قيمة من الدالة.\n\n8️⃣ <b>معالجة الأخطاء:</b> <code>try/except</code> بتمنع البرنامج من التوقف المفاجئ لو حصل خطأ، زي قسمة على صفر.\n\n9️⃣ <b>الملفات:</b> <code>open('file.txt', 'r')</code> لقراءة ملف، و<code>'w'</code> للكتابة. استخدم <code>with open(...) as f:</code> عشان الملف يتقفل تلقائياً.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل آلة حاسبة بسيطة تاخد رقمين وعملية من المستخدم، أو لعبة تخمين رقم عشوائي.\n\n📚 <b>مصادر مجانية:</b> python.org/doc (التوثيق الرسمي)، W3Schools Python، freeCodeCamp Python Course",
      "en": "🌱 <b>Python - Beginner Level</b>\n\n1️⃣ <b>Install &amp; setup:</b> Download Python from python.org and install VS Code as your editor. Run <code>python --version</code> in the terminal to confirm it's installed.\n\n2️⃣ <b>Variables &amp; data types:</b> A variable stores a value, like <code>age = 25</code>. Core types: <code>int</code> (whole numbers), <code>float</code> (decimals), <code>str</code> (text), <code>bool</code> (True/False).\n\n3️⃣ <b>Operators &amp; comparisons:</b> <code>+ - * /</code> for math, <code>== != &gt; &lt;</code> for comparisons. Python distinguishes <code>=</code> (assignment) from <code>==</code> (comparison).\n\n4️⃣ <b>Conditionals:</b> <code>if condition:</code> runs code when true, <code>elif</code> adds more conditions, <code>else</code> is the fallback.\n\n5️⃣ <b>Loops:</b> <code>for item in list:</code> iterates over items, <code>while condition:</code> repeats while true. Watch out for infinite loops.\n\n6️⃣ <b>Lists &amp; dicts:</b> <code>list = [1,2,3]</code> stores ordered items, <code>dict = {'key':'value'}</code> stores key-value pairs. Use <code>.append()</code> to add an item to a list.\n\n7️⃣ <b>Functions:</b> <code>def greet(name):</code> defines reusable code you can call by name instead of repeating it. Use <code>return</code> to send a value back.\n\n8️⃣ <b>Error handling:</b> <code>try/except</code> stops your program from crashing on errors, like dividing by zero.\n\n9️⃣ <b>Files:</b> <code>open('file.txt', 'r')</code> reads a file, <code>'w'</code> writes one. Use <code>with open(...) as f:</code> so the file closes automatically.\n\n🎯 <b>Project:</b> Build a simple calculator that takes two numbers and an operation, or a number-guessing game.\n\n📚 <b>Free resources:</b> python.org/doc (official docs), W3Schools Python, freeCodeCamp Python Course"
    },
    "intermediate": {
      "ar": "🌿 <b>بايثون - المستوى المتوسط</b>\n\n1️⃣ <b>البرمجة كائنية التوجه:</b> <code>class Car:</code> بتعرّف نوع بيانات مخصص بخصائص (attributes) ودوال (methods). الـ Inheritance بيخلي كلاس يورث سلوك كلاس تاني، زي <code>class ElectricCar(Car):</code>.\n\n2️⃣ <b>Comprehensions:</b> <code>[x*2 for x in range(10)]</code> طريقة مختصرة لإنشاء قائمة من حلقة في سطر واحد، أسرع وأنظف من الحلقة العادية.\n\n3️⃣ <b>الوحدات والحزم:</b> <code>import math</code> بتستورد كود جاهز. استخدم <code>pip install &lt;package&gt;</code> لتثبيت مكتبات خارجية.\n\n4️⃣ <b>البيئات الافتراضية:</b> <code>python -m venv venv</code> بتعزل مكتبات مشروعك عن باقي النظام، مهم جداً لتجنب تعارض الإصدارات.\n\n5️⃣ <b>JSON وAPIs:</b> مكتبة <code>requests</code> بتخليك تتواصل مع أي API خارجي: <code>requests.get(url).json()</code> بترجعلك البيانات كـ dict.\n\n6️⃣ <b>Decorators وGenerators:</b> الـ Decorator (<code>@decorator</code>) بيضيف سلوك لدالة من غير تعديل كودها. الـ Generator (<code>yield</code>) بيرجع قيم واحدة واحدة بدل ما يحمّل كل حاجة في الذاكرة.\n\n7️⃣ <b>اختبار الكود:</b> <code>pytest</code> بتخليك تكتب اختبارات تتأكد إن كودك شغال صح تلقائياً بعد أي تعديل.\n\n8️⃣ <b>قواعد البيانات:</b> <code>sqlite3</code> مدمجة في بايثون لقواعد بيانات بسيطة، و<code>SQLAlchemy</code> بتدّيك ORM للتعامل مع الجداول ككائنات بايثون.\n\n9️⃣ <b>Git:</b> <code>git add</code>, <code>git commit</code>, <code>git push</code> أساسيات حفظ ومشاركة كودك، ومهم جداً لأي مشروع حقيقي.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل Telegram Bot زي البوت ده بالظبط، أو REST API بسيط بـ Flask يخزن بيانات في SQLite.\n\n📚 <b>مصادر مجانية:</b> Real Python (مقالات ممتازة)، Corey Schafer على يوتيوب، docs.python-telegram-bot.org",
      "en": "🌿 <b>Python - Intermediate Level</b>\n\n1️⃣ <b>OOP:</b> <code>class Car:</code> defines a custom data type with attributes and methods. Inheritance lets a class reuse another's behavior, e.g. <code>class ElectricCar(Car):</code>.\n\n2️⃣ <b>Comprehensions:</b> <code>[x*2 for x in range(10)]</code> builds a list from a loop in one line — faster and cleaner than a regular loop.\n\n3️⃣ <b>Modules &amp; packages:</b> <code>import math</code> brings in ready-made code. Use <code>pip install &lt;package&gt;</code> to install external libraries.\n\n4️⃣ <b>Virtual environments:</b> <code>python -m venv venv</code> isolates your project's libraries from the rest of the system — key to avoiding version conflicts.\n\n5️⃣ <b>JSON &amp; APIs:</b> The <code>requests</code> library lets you talk to any external API: <code>requests.get(url).json()</code> returns the data as a dict.\n\n6️⃣ <b>Decorators &amp; generators:</b> A decorator (<code>@decorator</code>) adds behavior to a function without changing its code. A generator (<code>yield</code>) returns values one at a time instead of loading everything into memory.\n\n7️⃣ <b>Testing:</b> <code>pytest</code> lets you write tests that automatically verify your code still works after changes.\n\n8️⃣ <b>Databases:</b> <code>sqlite3</code> is built into Python for simple databases; <code>SQLAlchemy</code> gives you an ORM to work with tables as Python objects.\n\n9️⃣ <b>Git:</b> <code>git add</code>, <code>git commit</code>, <code>git push</code> are the basics of saving and sharing your code — essential for any real project.\n\n🎯 <b>Project:</b> Build a Telegram bot just like this one, or a simple Flask REST API backed by SQLite.\n\n📚 <b>Free resources:</b> Real Python (excellent articles), Corey Schafer on YouTube, docs.python-telegram-bot.org"
    },
    "advanced": {
      "ar": "🌳 <b>بايثون - المستوى المتقدم</b>\n\n1️⃣ <b>البرمجة غير المتزامنة:</b> <code>async def</code> و<code>await</code> بتخليك تشغّل عمليات متعددة (زي طلبات شبكة) من غير ما توقف البرنامج كله في انتظار كل واحدة، زي ما شفت في الكود بتاع البوت ده بالظبط.\n\n2️⃣ <b>Design Patterns:</b> حلول جاهزة لمشاكل تصميم متكررة، زي Singleton (كائن واحد بس في البرنامج كله) وFactory (دالة بتنشئ كائنات حسب النوع المطلوب).\n\n3️⃣ <b>تحسين الأداء:</b> استخدم <code>cProfile</code> لمعرفة أبطأ جزء في كودك. الـ <code>multiprocessing</code> بيستفيد من أكتر من CPU core، والـ <code>threading</code> مفيد للعمليات اللي بتستنى I/O.\n\n4️⃣ <b>بناء وتوزيع الحزم:</b> <code>pyproject.toml</code> وأدوات زي <code>poetry</code> بتخليك تحوّل مشروعك لمكتبة قابلة للنشر على PyPI يستخدمها أي حد بـ <code>pip install</code>.\n\n5️⃣ <b>أطر عمل متقدمة:</b> Django إطار عمل شامل (Batteries included) لمواقع كبيرة، وFastAPI أخف وأسرع ومناسب لبناء APIs حديثة مع توثيق تلقائي.\n\n6️⃣ <b>CI/CD وDocker:</b> Docker بيحزم تطبيقك مع كل احتياجاته في container شغال بنفس الطريقة في أي مكان. CI/CD (زي GitHub Actions) بتشغّل الاختبارات وتنشر الكود تلقائياً بعد كل تعديل.\n\n7️⃣ <b>قواعد بيانات إنتاجية:</b> PostgreSQL أقوى وأنسب من SQLite للتطبيقات الحقيقية، وRedis بيستخدم كـ cache سريع في الذاكرة لتقليل الحمل على قاعدة البيانات.\n\n8️⃣ <b>كود نظيف:</b> مبادئ SOLID بتساعدك تكتب كود سهل الصيانة والتوسيع، بدل كود شغال بس صعب التعديل فيه بعدين.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل نظام Microservices بسيط (خدمتين بيتكلموا مع بعض)، أو تطبيق FastAPI كامل مع تسجيل دخول (JWT authentication).\n\n📚 <b>مصادر مجانية:</b> FastAPI docs (من أفضل التوثيقات الموجودة)، Django docs، ArjanCodes على يوتيوب",
      "en": "🌳 <b>Python - Advanced Level</b>\n\n1️⃣ <b>Async programming:</b> <code>async def</code> and <code>await</code> let you run multiple operations (like network requests) without blocking the whole program while waiting — exactly like this bot's code does.\n\n2️⃣ <b>Design patterns:</b> Ready-made solutions to recurring design problems, like Singleton (only one instance ever exists) and Factory (a function that creates objects based on what's needed).\n\n3️⃣ <b>Performance tuning:</b> Use <code>cProfile</code> to find the slowest part of your code. <code>multiprocessing</code> takes advantage of multiple CPU cores; <code>threading</code> helps with I/O-bound waits.\n\n4️⃣ <b>Packaging &amp; distribution:</b> <code>pyproject.toml</code> and tools like <code>poetry</code> let you turn your project into a publishable library on PyPI that anyone can <code>pip install</code>.\n\n5️⃣ <b>Advanced frameworks:</b> Django is a full 'batteries-included' framework for large sites; FastAPI is lighter, faster, and great for modern APIs with automatic docs.\n\n6️⃣ <b>CI/CD &amp; Docker:</b> Docker packages your app with everything it needs into a container that runs the same everywhere. CI/CD (like GitHub Actions) automatically tests and deploys your code after every change.\n\n7️⃣ <b>Production databases:</b> PostgreSQL is far more capable than SQLite for real apps, and Redis acts as a fast in-memory cache to reduce database load.\n\n8️⃣ <b>Clean code:</b> SOLID principles help you write code that's easy to maintain and extend, instead of code that just works but is painful to change later.\n\n🎯 <b>Project:</b> Build a simple microservices system (two services talking to each other), or a full FastAPI app with JWT authentication.\n\n📚 <b>Free resources:</b> FastAPI docs (some of the best docs out there), Django docs, ArjanCodes on YouTube"
    }
  },
  "javascript": {
    "beginner": {
      "ar": "🌱 <b>جافاسكريبت - المستوى المبتدئ</b>\n\n1️⃣ <b>المتغيرات:</b> استخدم <code>let</code> للمتغيرات اللي هتتغيّر، و<code>const</code> للقيم الثابتة. تجنب <code>var</code> القديمة لأنها بتسبب مشاكل نطاق (scope).\n\n2️⃣ <b>الشروط:</b> <code>if/else</code> زي أي لغة تانية، و<code>switch</code> مفيد لما يكون عندك حالات كتير لنفس المتغير.\n\n3️⃣ <b>الحلقات:</b> <code>for</code> للتكرار برقم محدد، و<code>forEach</code> للتكرار على عناصر مصفوفة بطريقة أوضح وأنظف.\n\n4️⃣ <b>المصفوفات والكائنات:</b> <code>[1,2,3]</code> مصفوفة، و<code>{name:'Ahmed', age:25}</code> كائن. استخدم <code>.map()</code> و<code>.filter()</code> لمعالجة المصفوفات بدون حلقات يدوية.\n\n5️⃣ <b>الدوال:</b> <code>function greet(name) {}</code> الطريقة التقليدية، و<code>const greet = (name) =&gt; {}</code> هي الـ Arrow Function الأحدث والأقصر.\n\n6️⃣ <b>DOM:</b> <code>document.querySelector('.class')</code> بتاخد عنصر من صفحة HTML، و<code>.innerText</code> أو <code>.innerHTML</code> بتغيّر محتواه.\n\n7️⃣ <b>الأحداث:</b> <code>element.addEventListener('click', function(){...})</code> بتخلي كود يتنفذ لما المستخدم يضغط على عنصر معين.\n\n8️⃣ <b>Console والتصحيح:</b> <code>console.log()</code> أهم أداة لمعرفة إيه اللي بيحصل جوه كودك أثناء التطوير.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل To-Do List تقدر تضيف وتشيل منها مهام باستخدام HTML وCSS وJS بس.\n\n📚 <b>مصادر مجانية:</b> MDN Web Docs (المرجع الرسمي الأشمل)، JavaScript.info، freeCodeCamp",
      "en": "🌱 <b>JavaScript - Beginner Level</b>\n\n1️⃣ <b>Variables:</b> Use <code>let</code> for values that change, <code>const</code> for constants. Avoid old <code>var</code> since it causes scope issues.\n\n2️⃣ <b>Conditionals:</b> <code>if/else</code> like most languages; <code>switch</code> is handy when you have many cases for the same variable.\n\n3️⃣ <b>Loops:</b> <code>for</code> for a fixed number of iterations, <code>forEach</code> for iterating array items more clearly.\n\n4️⃣ <b>Arrays &amp; objects:</b> <code>[1,2,3]</code> is an array, <code>{name:'Ahmed', age:25}</code> is an object. Use <code>.map()</code> and <code>.filter()</code> to process arrays without manual loops.\n\n5️⃣ <b>Functions:</b> <code>function greet(name) {}</code> is the classic form; <code>const greet = (name) =&gt; {}</code> is the newer, shorter arrow function.\n\n6️⃣ <b>DOM:</b> <code>document.querySelector('.class')</code> grabs an element from an HTML page; <code>.innerText</code> or <code>.innerHTML</code> changes its content.\n\n7️⃣ <b>Events:</b> <code>element.addEventListener('click', function(){...})</code> runs code when a user clicks something.\n\n8️⃣ <b>Console &amp; debugging:</b> <code>console.log()</code> is your most important tool for seeing what's happening inside your code.\n\n🎯 <b>Project:</b> Build a To-Do List where you can add/remove tasks using just HTML, CSS, and JS.\n\n📚 <b>Free resources:</b> MDN Web Docs (the definitive reference), JavaScript.info, freeCodeCamp"
    },
    "intermediate": {
      "ar": "🌿 <b>جافاسكريبت - المستوى المتوسط</b>\n\n1️⃣ <b>ES6+:</b> Destructuring (<code>const {name} = user</code>) بتسحب قيم من كائن مباشرة، وSpread (<code>...array</code>) بينسخ أو يدمج مصفوفات بسهولة.\n\n2️⃣ <b>البرمجة غير المتزامنة:</b> <code>Promise</code> بيمثل نتيجة عملية هتخلص في المستقبل (زي طلب شبكة)، و<code>async/await</code> بتخلي كود الـ Promises يتقرأ زي كود عادي متسلسل.\n\n3️⃣ <b>Fetch API:</b> <code>fetch(url).then(res =&gt; res.json())</code> طريقة أساسية لطلب بيانات من أي API خارجي مباشرة من المتصفح.\n\n4️⃣ <b>JSON:</b> <code>JSON.parse()</code> بتحول نص JSON لكائن جافاسكريبت، و<code>JSON.stringify()</code> بتعمل العكس — أساسي للتعامل مع أي API.\n\n5️⃣ <b>Modules:</b> <code>export</code> و<code>import</code> بتخليك تقسم كودك على ملفات منظمة بدل ملف واحد ضخم.\n\n6️⃣ <b>Node.js وNPM:</b> Node بيخلي جافاسكريبت تشتغل خارج المتصفح (على السيرفر)، وNPM هو مدير الحزم اللي بتثبت بيه أي مكتبة.\n\n7️⃣ <b>React أو Vue:</b> أطر عمل بتخليك تبني واجهات تفاعلية معقدة بطريقة منظمة، بدل ما تتحكم في كل عنصر HTML يدوياً.\n\n8️⃣ <b>Git وGitHub:</b> أساسي لأي مشروع حقيقي، وGitHub بيخليك تشارك كودك وتتعاون مع فريق.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل تطبيق Weather App ياخد اسم مدينة ويجيب حالة الطقس من API خارجي زي OpenWeatherMap.\n\n📚 <b>مصادر مجانية:</b> JavaScript30 (تحدي 30 مشروع)، The Odin Project، React docs الرسمية",
      "en": "🌿 <b>JavaScript - Intermediate Level</b>\n\n1️⃣ <b>ES6+:</b> Destructuring (<code>const {name} = user</code>) pulls values straight from an object; spread (<code>...array</code>) copies or merges arrays easily.\n\n2️⃣ <b>Async programming:</b> A <code>Promise</code> represents a result that will be ready later (like a network request); <code>async/await</code> makes Promise code read like normal sequential code.\n\n3️⃣ <b>Fetch API:</b> <code>fetch(url).then(res =&gt; res.json())</code> is the basic way to request data from any external API directly in the browser.\n\n4️⃣ <b>JSON:</b> <code>JSON.parse()</code> turns a JSON string into a JS object, <code>JSON.stringify()</code> does the reverse — essential for working with any API.\n\n5️⃣ <b>Modules:</b> <code>export</code> and <code>import</code> let you split your code into organized files instead of one giant file.\n\n6️⃣ <b>Node.js &amp; NPM:</b> Node lets JavaScript run outside the browser (on a server); NPM is the package manager you use to install any library.\n\n7️⃣ <b>React or Vue:</b> Frameworks that let you build complex interactive UIs in an organized way, instead of manually controlling every HTML element.\n\n8️⃣ <b>Git &amp; GitHub:</b> Essential for any real project; GitHub lets you share your code and collaborate with a team.\n\n🎯 <b>Project:</b> Build a Weather App that takes a city name and fetches the weather from an external API like OpenWeatherMap.\n\n📚 <b>Free resources:</b> JavaScript30 (30-project challenge), The Odin Project, the official React docs"
    },
    "advanced": {
      "ar": "🌳 <b>جافاسكريبت - المستوى المتقدم</b>\n\n1️⃣ <b>TypeScript:</b> بيضيف أنواع بيانات ثابتة (Static Typing) فوق جافاسكريبت، بيكتشف أخطاء كتير وقت الكتابة بدل ما تظهر وقت التشغيل.\n\n2️⃣ <b>إدارة الحالة:</b> Redux وZustand بتحل مشكلة مشاركة البيانات بين مكونات كتيرة في تطبيق كبير بدون فوضى، وContext API حل أبسط مدمج في React نفسه.\n\n3️⃣ <b>Backend بـ Node.js:</b> Express إطار عمل خفيف لبناء APIs، بتعرّف فيه routes زي <code>app.get('/users', handler)</code> بسهولة.\n\n4️⃣ <b>قواعد البيانات:</b> MongoDB قاعدة بيانات NoSQL مرنة تخزن بيانات زي JSON، وPostgreSQL قاعدة بيانات علائقية قوية للبيانات المترابطة.\n\n5️⃣ <b>اختبار الكود:</b> Jest أشهر مكتبة اختبار في عالم جافاسكريبت، وTesting Library بتساعدك تختبر واجهة المستخدم زي ما المستخدم الحقيقي هيتعامل معاها.\n\n6️⃣ <b>أدوات البناء:</b> Vite أسرع بديل حديث لـ Webpack، بيجهز كودك (Bundle) للنشر بكفاءة عالية.\n\n7️⃣ <b>الأداء:</b> تقليل حجم الـ Bundle عن طريق Code Splitting وLazy Loading بيخلي موقعك يفتح أسرع للمستخدم.\n\n8️⃣ <b>Next.js:</b> إطار عمل فوق React بيضيف Server-Side Rendering وRouting جاهز، من أشهر الحلول لبناء تطبيقات Full-Stack بجافاسكريبت.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل تطبيق Full-Stack كامل (Frontend بـ React + Backend بـ Express + قاعدة بيانات).\n\n📚 <b>مصادر مجانية:</b> TypeScript Handbook الرسمي، Next.js docs، Fireship على يوتيوب",
      "en": "🌳 <b>JavaScript - Advanced Level</b>\n\n1️⃣ <b>TypeScript:</b> Adds static typing on top of JavaScript, catching many bugs at write-time instead of at runtime.\n\n2️⃣ <b>State management:</b> Redux and Zustand solve sharing data across many components in a large app without chaos; Context API is a simpler built-in React solution.\n\n3️⃣ <b>Backend with Node.js:</b> Express is a lightweight framework for building APIs — define routes like <code>app.get('/users', handler)</code> easily.\n\n4️⃣ <b>Databases:</b> MongoDB is a flexible NoSQL database that stores JSON-like data; PostgreSQL is a powerful relational database for connected data.\n\n5️⃣ <b>Testing:</b> Jest is the most popular JS testing library; Testing Library helps you test the UI the way a real user would interact with it.\n\n6️⃣ <b>Build tools:</b> Vite is a fast modern alternative to Webpack, bundling your code efficiently for deployment.\n\n7️⃣ <b>Performance:</b> Reducing bundle size via code splitting and lazy loading makes your site load faster for users.\n\n8️⃣ <b>Next.js:</b> A framework on top of React that adds server-side rendering and built-in routing — one of the most popular ways to build full-stack JS apps.\n\n🎯 <b>Project:</b> Build a complete full-stack app (React frontend + Express backend + a database).\n\n📚 <b>Free resources:</b> the official TypeScript Handbook, Next.js docs, Fireship on YouTube"
    }
  },
  "webdev": {
    "beginner": {
      "ar": "🌱 <b>تطوير الويب - المستوى المبتدئ</b>\n\n1️⃣ <b>HTML:</b> لغة الترميز اللي بتبني هيكل الصفحة. عناصر زي <code>&lt;h1&gt;</code>, <code>&lt;p&gt;</code>, <code>&lt;div&gt;</code>, <code>&lt;img&gt;</code> هي اللبنات الأساسية لأي صفحة ويب.\n\n2️⃣ <b>CSS:</b> بتتحكم في الشكل — الألوان (<code>color</code>)، الخطوط (<code>font-family</code>)، والمسافات (<code>margin</code>, <code>padding</code>). الـ Selectors بتحدد أي عنصر هتنسقه.\n\n3️⃣ <b>Box Model وFlexbox:</b> كل عنصر HTML عبارة عن صندوق له content وpadding وborder وmargin. Flexbox (<code>display: flex</code>) بيسهّل ترتيب العناصر جنب بعض أو فوق بعض بمرونة.\n\n4️⃣ <b>CSS Grid:</b> نظام تخطيط ثنائي الأبعاد (صفوف وأعمدة معاً)، مثالي لتصميمات معقدة زي صفحات المجلات أو لوحات التحكم.\n\n5️⃣ <b>التصميم المتجاوب:</b> <code>@media (max-width: 768px) {}</code> بتخليك تغيّر التصميم حسب حجم الشاشة، أساسي لأن أغلب الزوار بيستخدموا موبايل.\n\n6️⃣ <b>Forms:</b> عناصر <code>&lt;input&gt;</code>, <code>&lt;select&gt;</code>, <code>&lt;textarea&gt;</code> بتجمع بيانات من المستخدم، والـ attribute <code>required</code> بيمنع الإرسال لو الحقل فاضي.\n\n7️⃣ <b>النشر:</b> GitHub Pages بتخليك تنشر موقع HTML/CSS بسيط مجاناً برابط عام في دقايق.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل صفحة Portfolio شخصية فيها قسم عنك ومشاريعك، وتشتغل كويس على الموبايل والكمبيوتر.\n\n📚 <b>مصادر مجانية:</b> MDN Web Docs، CSS Tricks، freeCodeCamp Responsive Web Design",
      "en": "🌱 <b>Web Development - Beginner Level</b>\n\n1️⃣ <b>HTML:</b> The markup language that builds a page's structure. Elements like <code>&lt;h1&gt;</code>, <code>&lt;p&gt;</code>, <code>&lt;div&gt;</code>, <code>&lt;img&gt;</code> are the building blocks of any web page.\n\n2️⃣ <b>CSS:</b> Controls appearance — colors (<code>color</code>), fonts (<code>font-family</code>), and spacing (<code>margin</code>, <code>padding</code>). Selectors determine which element you're styling.\n\n3️⃣ <b>Box Model &amp; Flexbox:</b> Every HTML element is a box with content, padding, border, and margin. Flexbox (<code>display: flex</code>) makes arranging elements in a row or column easy and flexible.\n\n4️⃣ <b>CSS Grid:</b> A two-dimensional layout system (rows and columns together), ideal for complex layouts like magazine pages or dashboards.\n\n5️⃣ <b>Responsive design:</b> <code>@media (max-width: 768px) {}</code> lets you change the layout based on screen size — essential since most visitors are on mobile.\n\n6️⃣ <b>Forms:</b> <code>&lt;input&gt;</code>, <code>&lt;select&gt;</code>, <code>&lt;textarea&gt;</code> collect data from users; the <code>required</code> attribute blocks submission if a field is empty.\n\n7️⃣ <b>Deployment:</b> GitHub Pages lets you publish a simple HTML/CSS site for free with a public URL in minutes.\n\n🎯 <b>Project:</b> Build a personal portfolio page with an about section and your projects, working well on both mobile and desktop.\n\n📚 <b>Free resources:</b> MDN Web Docs, CSS Tricks, freeCodeCamp Responsive Web Design"
    },
    "intermediate": {
      "ar": "🌿 <b>تطوير الويب - المستوى المتوسط</b>\n\n1️⃣ <b>Sass/SCSS:</b> امتداد لـ CSS بيضيف متغيرات (<code>$primary-color</code>) وnesting وfunctions، بيخلي ملفات الـ CSS الكبيرة أسهل في التنظيم.\n\n2️⃣ <b>Tailwind CSS:</b> framework بيدّيك classes جاهزة (<code>flex</code>, <code>p-4</code>, <code>text-red-500</code>) تكتبها في الـ HTML مباشرة بدل ما تكتب CSS منفصل، بيسرّع التطوير جداً.\n\n3️⃣ <b>JavaScript للتفاعل:</b> إظهار/إخفاء عناصر، Validation للنماذج قبل الإرسال، Slideshows — كله بيحتاج JS تتفاعل مع الصفحة.\n\n4️⃣ <b>إمكانية الوصول (a11y):</b> استخدام <code>alt</code> للصور، وترتيب صحيح للعناوين (<code>h1</code> قبل <code>h2</code>)، بيخلي موقعك يشتغل صح مع قارئات الشاشة لذوي الإعاقة البصرية.\n\n5️⃣ <b>SEO الأساسي:</b> عناوين <code>&lt;title&gt;</code> وصفية، وعلامات <code>&lt;meta description&gt;</code>، وهيكل HTML منظم بيساعد محركات البحث تفهم صفحتك وتظهرها في النتائج.\n\n6️⃣ <b>أدوات البناء:</b> Vite بيدّيك تجربة تطوير سريعة (Hot Reload فوري) وبيجهز الكود للنشر بأداء عالي.\n\n7️⃣ <b>الاستضافة الحديثة:</b> Netlify وVercel بيخلوك تنشر موقعك مباشرة من GitHub، وكل تعديل بترفعه بيتنشر تلقائياً.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل Landing Page كامل لمنتج وهمي فيه Hero section وFeatures وForm تواصل، وانشره على Vercel.\n\n📚 <b>مصادر مجانية:</b> Tailwind CSS docs، web.dev (من جوجل)، Frontend Mentor للتحديات المجانية",
      "en": "🌿 <b>Web Development - Intermediate Level</b>\n\n1️⃣ <b>Sass/SCSS:</b> A CSS extension adding variables (<code>$primary-color</code>), nesting, and functions, making large CSS files much easier to organize.\n\n2️⃣ <b>Tailwind CSS:</b> Gives you ready-made classes (<code>flex</code>, <code>p-4</code>, <code>text-red-500</code>) written directly in HTML instead of separate CSS — speeds up development a lot.\n\n3️⃣ <b>JavaScript for interactivity:</b> Showing/hiding elements, validating forms before submission, slideshows — all need JS interacting with the page.\n\n4️⃣ <b>Accessibility (a11y):</b> Using <code>alt</code> on images and correct heading order (<code>h1</code> before <code>h2</code>) makes your site work properly with screen readers for visually impaired users.\n\n5️⃣ <b>Basic SEO:</b> Descriptive <code>&lt;title&gt;</code> tags, <code>&lt;meta description&gt;</code> tags, and clean HTML structure help search engines understand and rank your page.\n\n6️⃣ <b>Build tools:</b> Vite gives you a fast dev experience (instant hot reload) and bundles your code efficiently for deployment.\n\n7️⃣ <b>Modern hosting:</b> Netlify and Vercel let you deploy straight from GitHub, with every push automatically deployed.\n\n🎯 <b>Project:</b> Build a complete landing page for a mock product with a hero section, features, and a contact form, then deploy it on Vercel.\n\n📚 <b>Free resources:</b> Tailwind CSS docs, web.dev (by Google), Frontend Mentor for free challenges"
    },
    "advanced": {
      "ar": "🌳 <b>تطوير الويب - المستوى المتقدم</b>\n\n1️⃣ <b>أطر عمل Frontend:</b> React الأشهر والأكبر مجتمعاً، Vue أبسط في التعلم، Svelte بيترجم الكود وقت البناء فبيطلع أداء أعلى.\n\n2️⃣ <b>Server-Side Rendering:</b> Next.js (لـ React) وNuxt.js (لـ Vue) بيخلوا الصفحة تترندر على السيرفر الأول، فبتظهر أسرع للمستخدم وأفضل لمحركات البحث.\n\n3️⃣ <b>الأداء:</b> Lighthouse أداة من جوجل بتقيّم سرعة موقعك وتديك اقتراحات، وCore Web Vitals هي المقاييس اللي جوجل بيستخدمها فعلياً في ترتيب نتائج البحث.\n\n4️⃣ <b>PWA:</b> تطبيقات ويب تقدر تتثبت على الموبايل زي تطبيق عادي وتشتغل حتى بدون إنترنت باستخدام Service Workers.\n\n5️⃣ <b>WebSockets:</b> بروتوكول بيفتح اتصال مستمر بين المتصفح والسيرفر، أساسي لتطبيقات زي الشات اللحظي أو الإشعارات الفورية.\n\n6️⃣ <b>CI/CD للـ Frontend:</b> GitHub Actions بتشغّل اختبارات وبناء تلقائي قبل كل نشر، بيمنع نشر كود فيه أخطاء.\n\n7️⃣ <b>اختبار Frontend:</b> Cypress وPlaywright بيحاكوا تفاعل المستخدم الحقيقي مع موقعك (ضغط أزرار، ملء نماذج) للتأكد إن كل حاجة شغالة قبل النشر.\n\n🎯 <b>مشروع تطبيقي:</b> اعمل تطبيق شات لحظي (Real-time chat) بيستخدم WebSockets، أو انشر تطبيق Next.js كامل بـ SSR.\n\n📚 <b>مصادر مجانية:</b> web.dev، Next.js docs الرسمية، Kevin Powell على يوتيوب (CSS متقدم)",
      "en": "🌳 <b>Web Development - Advanced Level</b>\n\n1️⃣ <b>Frontend frameworks:</b> React has the biggest community, Vue is simpler to learn, Svelte compiles at build time for higher runtime performance.\n\n2️⃣ <b>Server-side rendering:</b> Next.js (React) and Nuxt.js (Vue) render the page on the server first, so it appears faster to users and ranks better in search engines.\n\n3️⃣ <b>Performance:</b> Lighthouse (from Google) scores your site's speed and gives suggestions; Core Web Vitals are the actual metrics Google uses in search rankings.\n\n4️⃣ <b>PWAs:</b> Web apps installable on mobile like a native app, working offline via Service Workers.\n\n5️⃣ <b>WebSockets:</b> A protocol that opens a persistent connection between browser and server — essential for real-time chat or instant notifications.\n\n6️⃣ <b>Frontend CI/CD:</b> GitHub Actions runs tests and builds automatically before every deploy, preventing broken code from going live.\n\n7️⃣ <b>Frontend testing:</b> Cypress and Playwright simulate real user interactions (clicking buttons, filling forms) to confirm everything works before deploying.\n\n🎯 <b>Project:</b> Build a real-time chat app using WebSockets, or deploy a full Next.js app with SSR.\n\n📚 <b>Free resources:</b> web.dev, the official Next.js docs, Kevin Powell on YouTube (advanced CSS)"
    }
  },
  "sql": {
    "beginner": {
      "ar": "🌱 <b>SQL وقواعد البيانات - المستوى المبتدئ</b>\n\n1️⃣ <b>قواعد البيانات العلائقية:</b> البيانات مخزنة في جداول (Tables)، كل جدول له أعمدة (Columns) وصفوف (Rows)، زي جدول Excel لكن أقوى بكتير.\n\n2️⃣ <b>SELECT وWHERE:</b> <code>SELECT name FROM users WHERE age &gt; 18;</code> بتجيب بيانات محددة حسب شرط معين — أساس أي استعلام SQL.\n\n3️⃣ <b>ORDER BY وLIMIT:</b> <code>ORDER BY name ASC</code> بترتب النتائج، و<code>LIMIT 10</code> بتحدد عدد النتائج المرجعة بدل ما تجيب كل الجدول.\n\n4️⃣ <b>INSERT وUPDATE وDELETE:</b> <code>INSERT INTO</code> بتضيف صف جديد، <code>UPDATE</code> بتعدّل بيانات موجودة، <code>DELETE</code> بتمسح صفوف — احذر تستخدمهم بدون WHERE عشان متمسحش/تعدّلش كل الجدول غلط.\n\n5️⃣ <b>أنواع البيانات:</b> <code>INT</code> للأرقام الصحيحة، <code>VARCHAR</code> للنصوص، <code>DATE</code> للتواريخ، <code>BOOLEAN</code> لـ true/false — اختيار النوع الصح بيوفر مساحة ويمنع أخطاء.\n\n6️⃣ <b>المفتاح الأساسي:</b> <code>PRIMARY KEY</code> عمود بيميز كل صف بشكل فريد (زي رقم قومي)، وبيكون غالباً <code>id</code> تلقائي الزيادة.\n\n🎯 <b>مشروع تطبيقي:</b> صمم قاعدة بيانات بسيطة لمكتبة كتب فيها جدول Books وجدول Authors.\n\n📚 <b>مصادر مجانية:</b> SQLBolt (تفاعلي وممتاز للمبتدئين)، W3Schools SQL، Mode SQL Tutorial",
      "en": "🌱 <b>SQL &amp; Databases - Beginner Level</b>\n\n1️⃣ <b>Relational databases:</b> Data lives in tables; each table has columns and rows — like an Excel sheet but far more powerful.\n\n2️⃣ <b>SELECT &amp; WHERE:</b> <code>SELECT name FROM users WHERE age &gt; 18;</code> fetches specific data matching a condition — the basis of any SQL query.\n\n3️⃣ <b>ORDER BY &amp; LIMIT:</b> <code>ORDER BY name ASC</code> sorts results; <code>LIMIT 10</code> caps how many rows come back instead of fetching the whole table.\n\n4️⃣ <b>INSERT, UPDATE, DELETE:</b> <code>INSERT INTO</code> adds a new row, <code>UPDATE</code> modifies existing data, <code>DELETE</code> removes rows — always use WHERE carefully to avoid wiping/changing the whole table.\n\n5️⃣ <b>Data types:</b> <code>INT</code> for whole numbers, <code>VARCHAR</code> for text, <code>DATE</code> for dates, <code>BOOLEAN</code> for true/false — picking the right type saves space and prevents bugs.\n\n6️⃣ <b>Primary key:</b> A <code>PRIMARY KEY</code> column uniquely identifies each row (like a national ID), usually an auto-incrementing <code>id</code>.\n\n🎯 <b>Project:</b> Design a simple database for a book library with a Books table and an Authors table.\n\n📚 <b>Free resources:</b> SQLBolt (interactive, great for beginners), W3Schools SQL, Mode SQL Tutorial"
    },
    "intermediate": {
      "ar": "🌿 <b>SQL وقواعد البيانات - المستوى المتوسط</b>\n\n1️⃣ <b>JOIN:</b> بتربط بيانات من جدولين أو أكتر. <code>INNER JOIN</code> بيرجع الصفوف المتطابقة بس، و<code>LEFT JOIN</code> بيرجع كل صفوف الجدول الأول حتى لو مفيش تطابق.\n\n2️⃣ <b>GROUP BY وHAVING:</b> <code>GROUP BY category</code> بتجمع الصفوف حسب قيمة معينة (مفيدة مع <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>)، و<code>HAVING</code> بتفلتر النتائج المجمّعة زي <code>WHERE</code> بس بعد التجميع.\n\n3️⃣ <b>Subqueries:</b> استعلام جوه استعلام تاني، زي <code>WHERE id IN (SELECT ...)</code>، مفيد لما محتاج نتيجة استعلام كشرط في استعلام تاني.\n\n4️⃣ <b>المفاتيح الأجنبية:</b> <code>FOREIGN KEY</code> بتربط جدول بجدول تاني (زي عمود <code>author_id</code> في جدول Books بيشاور على جدول Authors)، وبتحافظ على تناسق البيانات.\n\n5️⃣ <b>Indexes:</b> بنية بيانات إضافية بتسرّع البحث في عمود معين جداً، لكنها بتبطّئ عمليات الكتابة شوية — استخدمها للأعمدة اللي بتبحث فيها كتير.\n\n6️⃣ <b>Normalization:</b> تقسيم البيانات لجداول متعددة لتقليل التكرار، زي فصل بيانات العميل عن بيانات الطلبات بدل تكرارها في كل طلب.\n\n7️⃣ <b>SQL من بايثون:</b> SQLAlchemy بتخليك تتعامل مع الجداول ككائنات بايثون بدل ما تكتب SQL خام كل مرة.\n\n🎯 <b>مشروع تطبيقي:</b> صمم قاعدة بيانات لنظام إدارة عيادة فيها جداول مترابطة للمرضى والمواعيد والأطباء (زي مشروعك بالظبط!).\n\n📚 <b>مصادر مجانية:</b> Mode SQL Tutorial، PostgreSQL Tutorial، freeCodeCamp SQL Course",
      "en": "🌿 <b>SQL &amp; Databases - Intermediate Level</b>\n\n1️⃣ <b>JOIN:</b> Links data from two or more tables. <code>INNER JOIN</code> returns only matching rows; <code>LEFT JOIN</code> returns all rows from the first table even without a match.\n\n2️⃣ <b>GROUP BY &amp; HAVING:</b> <code>GROUP BY category</code> groups rows by a value (useful with <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>); <code>HAVING</code> filters grouped results, like <code>WHERE</code> but after grouping.\n\n3️⃣ <b>Subqueries:</b> A query inside another query, e.g. <code>WHERE id IN (SELECT ...)</code>, useful when you need a query's result as a condition in another.\n\n4️⃣ <b>Foreign keys:</b> A <code>FOREIGN KEY</code> links one table to another (e.g. an <code>author_id</code> column in Books pointing to Authors) and keeps data consistent.\n\n5️⃣ <b>Indexes:</b> An extra data structure that greatly speeds up searching a specific column, at the cost of slightly slower writes — use them on columns you query often.\n\n6️⃣ <b>Normalization:</b> Splitting data across multiple tables to reduce duplication, e.g. separating customer data from order data instead of repeating it per order.\n\n7️⃣ <b>SQL from Python:</b> SQLAlchemy lets you work with tables as Python objects instead of writing raw SQL every time.\n\n🎯 <b>Project:</b> Design a database for a clinic management system with related tables for patients, appointments, and doctors (exactly like your project!).\n\n📚 <b>Free resources:</b> Mode SQL Tutorial, PostgreSQL Tutorial, freeCodeCamp SQL Course"
    },
    "advanced": {
      "ar": "🌳 <b>SQL وقواعد البيانات - المستوى المتقدم</b>\n\n1️⃣ <b>Query Optimization:</b> <code>EXPLAIN ANALYZE</code> بيوريك خطة تنفيذ الاستعلام، بتعرف منه لو الاستعلام بيستخدم index أو بيمسح الجدول كله (Full Table Scan) وهو أبطأ بكتير.\n\n2️⃣ <b>Transactions وACID:</b> <code>BEGIN; ... COMMIT;</code> بتضمن إن مجموعة عمليات تتنفذ كلها أو ولا واحدة منها، مهم جداً لعمليات زي تحويل الأموال بين حسابين.\n\n3️⃣ <b>Stored Procedures وTriggers:</b> كود SQL بيتخزن جوه قاعدة البيانات نفسها ويتنفذ تلقائياً عند حدث معين (زي إضافة صف)، بيقلل الحاجة لمنطق مكرر في التطبيق.\n\n4️⃣ <b>Window Functions:</b> زي <code>ROW_NUMBER()</code> و<code>RANK()</code> بتديك حسابات عبر مجموعة صفوف من غير ما تدمجهم في صف واحد زي GROUP BY.\n\n5️⃣ <b>Replication وBackup:</b> نسخ قاعدة البيانات على أكتر من سيرفر بيحمي من فقدان البيانات ويوزع الحمل، والـ Backup الدوري ضروري لأي نظام إنتاجي.\n\n6️⃣ <b>NoSQL مقابل SQL:</b> استخدم SQL للبيانات المترابطة اللي محتاجة تناسق صارم، وNoSQL (زي MongoDB) للبيانات المرنة اللي بتتغير هيكلتها كتير أو محتاجة سرعة كتابة عالية جداً.\n\n7️⃣ <b>Redis للـ Caching:</b> بيخزن نتائج الاستعلامات المتكررة في الذاكرة عشان يقلل الحمل على قاعدة البيانات الأساسية ويسرّع الاستجابة بشكل كبير.\n\n🎯 <b>مشروع تطبيقي:</b> صمم نظام قاعدة بيانات لتطبيق كبير (زي متجر إلكتروني) مع طبقة Caching بـ Redis.\n\n📚 <b>مصادر مجانية:</b> PostgreSQL docs الرسمية، Use The Index Luke (شرح ممتاز للـ Indexes)، Redis docs",
      "en": "🌳 <b>SQL &amp; Databases - Advanced Level</b>\n\n1️⃣ <b>Query optimization:</b> <code>EXPLAIN ANALYZE</code> shows the query execution plan, revealing whether it uses an index or does a much slower full table scan.\n\n2️⃣ <b>Transactions &amp; ACID:</b> <code>BEGIN; ... COMMIT;</code> ensures a group of operations either all succeed or none do — critical for things like transferring money between accounts.\n\n3️⃣ <b>Stored procedures &amp; triggers:</b> SQL code stored inside the database itself, running automatically on an event (like a row insert), reducing duplicated logic in your app.\n\n4️⃣ <b>Window functions:</b> Things like <code>ROW_NUMBER()</code> and <code>RANK()</code> give you calculations across a set of rows without collapsing them into one row like GROUP BY does.\n\n5️⃣ <b>Replication &amp; backups:</b> Copying a database across multiple servers protects against data loss and spreads load; regular backups are essential for any production system.\n\n6️⃣ <b>NoSQL vs SQL:</b> Use SQL for connected data needing strict consistency, and NoSQL (like MongoDB) for flexible data whose structure changes often or that needs very high write speed.\n\n7️⃣ <b>Redis for caching:</b> Stores results of frequent queries in memory to reduce load on the main database and dramatically speed up responses.\n\n🎯 <b>Project:</b> Design a database system for a large app (like an online store) with a Redis caching layer.\n\n📚 <b>Free resources:</b> the official PostgreSQL docs, Use The Index Luke (excellent index explainer), Redis docs"
    }
  },
  "dsa": {
    "beginner": {

      "en": "🌱 <b>Data Structures &amp; Algorithms - Beginner</b>\n\n1️⃣ <b>Arrays &amp; linked lists:</b> An array stores elements contiguously in memory, fast for random access. A linked list has each element pointing to the next, fast for inserting/removing at the start.\n\n2️⃣ <b>Stacks &amp; queues:</b> A stack follows LIFO (last in, first out, like a stack of plates); a queue follows FIFO (first in, first out, like a line of people).\n\n3️⃣ <b>Big O:</b> A way to measure algorithm efficiency independent of hardware speed. <code>O(1)</code> is constant-fast, <code>O(n)</code> grows linearly with data, <code>O(n²)</code> gets very slow with large data.\n\n4️⃣ <b>Search algorithms:</b> Linear search checks each element one by one <code>O(n)</code>; binary search halves a sorted array each step <code>O(log n)</code> — much faster but needs sorted data first.\n\n5️⃣ <b>Basic sorting:</b> Bubble sort and selection sort are easy to understand but slow <code>O(n²)</code> — good for learning, not for real use with large data.\n\n🎯 <b>Practice:</b> Solve 20 easy problems on LeetCode or HackerRank — focus on understanding the solution, not memorizing it.\n\n📚 <b>Free resources:</b> freeCodeCamp DSA, visualgo.net (visual algorithm walkthroughs), NeetCode on YouTube"

    function switchTool(tool) {
      document.querySelectorAll('.tool-btn').forEach(btn => {

        btn.classList.add('text-slate-600', 'hover:bg-slate-200/50');
      });
      const activeBtn = document.getElementById(`btn-${tool}`);
      if (activeBtn) { activeBtn.classList.add('bg-teal-600', 'text-white'); activeBtn.classList.remove('text-slate-600', 'hover:bg-slate-200/50'); }

      const content = document.getElementById('tool-content');
      const soon = currentLang === 'ar' ? 'قريباً...' : 'Coming soon...';
      content.innerHTML = TOOL_RENDERERS[tool] ? TOOL_RENDERERS[tool]() : `<p class="text-slate-500">${soon}</p>`;
      const meta = TOOL_META[tool];
      if (meta) {
        const h3 = content.querySelector('h3');
        const p = content.querySelector('p');
        if (h3 && meta.title) h3.textContent = meta.title[currentLang];
        if (p && meta.desc) p.textContent = meta.desc[currentLang];
      }
      if (TOOL_INIT[tool]) TOOL_INIT[tool]();
    }

      const lines = md.split('\n'); const out = []; let inCode = false;

    function computeDiff(a, b) {
      const A = a.split('\n'), B = b.split('\n'), n = A.length, m = B.length;
      const dp = Array.from({length:n+1}, () => new Array(m+1).fill(0));
      for (let i=n-1;i>=0;i--) for (let j=m-1;j>=0;j--) dp[i][j] = A[i]===B[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
      const res = []; let i=0,j=0;
      while (i<n && j<m) { if (A[i]===B[j]) { res.push('  '+A[i]); i++; j++; } else if (dp[i+1][j] >= dp[i][j+1]) { res.push('- '+A[i]); i++; } else { res.push('+ '+B[j]); j++; } }
      while (i<n) { res.push('- '+A[i]); i++; } while (j<m) { res.push('+ '+B[j]); j++; }

          <p class="mt-1 text-sm text-slate-500 sm:text-base">${subtitle}</p>
        </div>
        <div id="learn-step-tracks" class="learn-step"></div>
        <div id="learn-step-levels" class="learn-step hidden"></div>
        <div id="learn-step-content" class="learn-step hidden"></div>
      `;
    }

    function learnBackToTracks() {
      document.getElementById('learn-step-tracks').classList.remove('hidden');
      document.getElementById('learn-step-levels').classList.add('hidden');
      document.getElementById('learn-step-content').classList.add('hidden');
      document.getElementById('learn-step-tracks').innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          ${LEARN_TRACKS.map(tr => `
            <button onclick="learnOpenTrack('${tr.id}')" class="rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-sm hover:-translate-y-0.5 hover:shadow-lg transition-all">
              <div class="text-4xl mb-2">${tr.emoji}</div>
              <div class="text-sm font-bold text-slate-700">${tr[currentLang]}</div>
            </button>
          `).join('')}
        </div>`;
    }

    function learnOpenTrack(trackId) {
      currentLearnTrack = trackId;
      const track = LEARN_TRACKS.find(tr => tr.id === trackId);
      document.getElementById('learn-step-tracks').classList.add('hidden');
      document.getElementById('learn-step-content').classList.add('hidden');
      const el = document.getElementById('learn-step-levels');
      el.classList.remove('hidden');
      const backLabel = currentLang === 'ar' ? '→ كل المسارات' : '← All Tracks';
      el.innerHTML = `
        <button onclick="learnBackToTracks()" class="mb-4 text-sm text-teal-600 hover:underline">${backLabel}</button>
        <h2 class="text-xl font-bold mb-4">${track.emoji} ${track[currentLang]}</h2>
        <div class="grid gap-3 sm:grid-cols-3">
          ${LEARN_LEVELS.map(l => `
            <button onclick="learnShowContent('${l.id}')" class="rounded-2xl border border-slate-200 bg-white p-5 text-center shadow-sm hover:-translate-y-0.5 hover:shadow-lg transition-all">
              <div class="text-2xl mb-1">${l.emoji}</div>
              <div class="text-sm font-bold text-slate-700">${l[currentLang]}</div>
            </button>
          `).join('')}
        </div>`;
    }

    function learnShowContent(levelId) {
      const track = LEARN_TRACKS.find(tr => tr.id === currentLearnTrack);
      const level = LEARN_LEVELS.find(l => l.id === levelId);
      const content = LEARN_CONTENT[currentLearnTrack][levelId][currentLang];
      document.getElementById('learn-step-levels').classList.add('hidden');
      const el = document.getElementById('learn-step-content');
      el.classList.remove('hidden');
      const backLabel = currentLang === 'ar' ? '→ كل المستويات' : '← All Levels';
      el.innerHTML = `
        <button onclick="learnOpenTrack('${currentLearnTrack}')" class="mb-4 text-sm text-teal-600 hover:underline">${backLabel}</button>
        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <h2 class="text-lg font-bold text-teal-700 mb-4 text-center">${track.emoji} ${track[currentLang]} — ${level.emoji} ${level[currentLang]}</h2>
          <div class="text-sm leading-8 text-slate-700 whitespace-pre-wrap">${content}</div>
        </div>`;
    }


    // ═══════════════════════════════════════════════
    // SNIPPETS
    // ═══════════════════════════════════════════════
    function renderSnippets() {
      const SNIPPETS = [
        { title: {ar:'دالة Debounce',en:'Debounce Function'}, lang: 'JavaScript', code: 'function debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}' },
        { title: {ar:'دالة Throttle',en:'Throttle Function'}, lang: 'JavaScript', code: 'function throttle(fn, limit) {\n  let inThrottle;\n  return (...args) => {\n    if (!inThrottle) {\n      fn(...args);\n      inThrottle = true;\n      setTimeout(() => inThrottle = false, limit);\n    }\n  };\n}' },
        { title: {ar:'جلب بيانات عبر fetch',en:'Fetch Data Helper'}, lang: 'JavaScript', code: 'async function getData(url) {\n  const res = await fetch(url);\n  if (!res.ok) throw new Error("Network error");\n  return res.json();\n}' },
        { title: {ar:'تأخير التنفيذ (Sleep)',en:'Sleep / Delay'}, lang: 'JavaScript', code: 'const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));' },
        { title: {ar:'نسخ عميق لكائن',en:'Deep Clone an Object'}, lang: 'JavaScript', code: 'const deepClone = (obj) => JSON.parse(JSON.stringify(obj));\n// or for complex cases:\nconst deepClone2 = (obj) => structuredClone(obj);' },
        { title: {ar:'توسيط عنصر بـ Flexbox',en:'Center an Element with Flexbox'}, lang: 'CSS', code: '.center {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}' },
        { title: {ar:'Grid متجاوب تلقائياً',en:'Auto-Responsive Grid'}, lang: 'CSS', code: '.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 1rem;\n}' },
        { title: {ar:'قراءة ملف بأمان',en:'Safe File Reading'}, lang: 'Python', code: 'def read_file_safe(path):\n    try:\n        with open(path, "r", encoding="utf-8") as f:\n            return f.read()\n    except FileNotFoundError:\n        return None' },
        { title: {ar:'Context Manager للتوقيت',en:'Timing Context Manager'}, lang: 'Python', code: 'from contextlib import contextmanager\nimport time\n\n@contextmanager\ndef timer(label):\n    start = time.time()\n    yield\n    print(f"{label}: {time.time()-start:.3f}s")' },
        { title: {ar:'Decorator لإعادة المحاولة',en:'Retry Decorator'}, lang: 'Python', code: 'def retry(times=3):\n    def decorator(fn):\n        def wrapper(*args, **kwargs):\n            for i in range(times):\n                try:\n                    return fn(*args, **kwargs)\n                except Exception as e:\n                    if i == times - 1:\n                        raise\n        return wrapper\n    return decorator' },
        { title: {ar:'Singleton Pattern',en:'Singleton Pattern'}, lang: 'Python', code: 'class Singleton:\n    _instance = None\n    def __new__(cls, *args, **kwargs):\n        if cls._instance is None:\n            cls._instance = super().__new__(cls)\n        return cls._instance' },
        { title: {ar:'حماية Route في Express',en:'Protect an Express Route'}, lang: 'Node.js', code: 'function requireAuth(req, res, next) {\n  if (!req.session.userId) {\n    return res.status(401).json({ error: "Unauthorized" });\n  }\n  next();\n}' },
      ];
      const title = currentLang === 'ar' ? 'مقتطفات برمجية' : 'Code Snippets';
      const subtitle = currentLang === 'ar' ? 'مكتبة من المقتطفات الجاهزة لتسريع عملك' : 'A library of ready-made snippets to speed up your work';
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">${title}</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">${subtitle}</p>
        </div>
        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          ${SNIPPETS.map(s => `
            <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
              <div class="mb-3 flex items-center justify-between">
                <h3 class="text-base font-bold">${s.title[currentLang]}</h3>
                <span class="rounded-full bg-teal-50 px-2.5 py-0.5 text-xs font-medium text-teal-700">${s.lang}</span>
              </div>
              ${outputWithCopy(s.code)}
            </div>
          `).join('')}
        </div>`;
    }

    // ═══════════════════════════════════════════════
    // COLORS
    // ═══════════════════════════════════════════════
    function renderColors() {
      const PALETTES = [
        { name: {ar:'زمردي',en:'Emerald'}, colors: ['#0f766e','#14b8a6','#5eead4','#ccfbf1','#f0fdfa'] },
        { name: {ar:'عنبري',en:'Amber'}, colors: ['#b45309','#f59e0b','#fcd34d','#fef3c7','#fffbeb'] },
        { name: {ar:'وردي',en:'Rose'}, colors: ['#be123c','#f43f5e','#fda4af','#ffe4e6','#fff1f2'] },
        { name: {ar:'نيلي',en:'Indigo'}, colors: ['#4338ca','#6366f1','#a5b4fc','#e0e7ff','#eef2ff'] },
        { name: {ar:'محيطي',en:'Ocean'}, colors: ['#075985','#0ea5e9','#7dd3fc','#e0f2fe','#f0f9ff'] },
        { name: {ar:'غابي',en:'Forest'}, colors: ['#166534','#22c55e','#86efac','#dcfce7','#f0fdf4'] },
      ];
      const title = currentLang === 'ar' ? 'لوحات الألوان' : 'Color Palettes';
      const subtitle = currentLang === 'ar' ? 'لوحات منسّقة لإلهام تصاميمك (اضغط على اللون لنسخه) + محول HEX↔RGB في تبويب الأدوات' : 'Curated palettes to inspire your designs (click a swatch to copy it) + a HEX↔RGB converter in the Tools tab';
      const copyTitle = currentLang === 'ar' ? 'نسخ' : 'Copy';
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">${title}</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">${subtitle}</p>
        </div>
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
          ${PALETTES.map(p => `
            <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
              <div class="flex h-24">
                ${p.colors.map(c => `<button onclick="copyToClipboard('${c}')" class="flex-1 transition-transform hover:scale-105" style="background-color:${c}" title="${copyTitle} ${c}"></button>`).join('')}
              </div>
              <div class="p-4">
                <span class="text-lg font-bold text-slate-800">${p.name[currentLang]}</span>
                <div class="mt-1 flex flex-wrap gap-x-2 code-out">
                  ${p.colors.map(c => `<span class="font-mono text-[11px] text-slate-400">${c}</span>`).join('')}
                </div>
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    // ═══════════════════════════════════════════════
    // RESOURCES
    // ═══════════════════════════════════════════════
    function renderResources() {
      const RESOURCES = [
        { title: 'MDN Web Docs', url: 'https://developer.mozilla.org', desc: {ar:'المرجع الأول لمطوري الويب',en:'The go-to reference for web developers'} },
        { title: 'React Documentation', url: 'https://react.dev', desc: {ar:'التوثيق الرسمي لمكتبة React',en:'The official docs for the React library'} },
        { title: 'Tailwind CSS', url: 'https://tailwindcss.com', desc: {ar:'إطار عمل CSS قائم على الأدوات',en:'A utility-first CSS framework'} },
        { title: 'Python Docs', url: 'https://docs.python.org/3/', desc: {ar:'التوثيق الرسمي للغة بايثون',en:'The official Python language docs'} },
        { title: 'freeCodeCamp', url: 'https://www.freecodecamp.org', desc: {ar:'دورات برمجة مجانية كاملة',en:'Complete free coding courses'} },
        { title: 'LeetCode', url: 'https://leetcode.com', desc: {ar:'تدريب على هياكل البيانات والخوارزميات',en:'Practice data structures and algorithms'} },
        { title: 'DevDocs', url: 'https://devdocs.io', desc: {ar:'كل توثيقات لغات البرمجة في مكان واحد',en:'All programming language docs in one place'} },
        { title: 'Can I Use', url: 'https://caniuse.com', desc: {ar:'دعم المتصفحات لميزات الويب',en:'Browser support for web features'} },
        { title: 'GitHub', url: 'https://github.com', desc: {ar:'استضافة المشاريع والتحكم بالإصدارات',en:'Project hosting and version control'} },
      ];
      const title = currentLang === 'ar' ? 'مصادر تعلّم' : 'Learning Resources';
      const subtitle = currentLang === 'ar' ? 'روابط لأهم المراجع والأدوات التي يحتاجها كل مطور' : 'Links to the top references and tools every developer needs';
      return `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">${title}</h1>
          <p class="mt-1 text-sm text-slate-500 sm:text-base">${subtitle}</p>
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
          ${RESOURCES.map(r => `
            <a href="${r.url}" target="_blank" rel="noopener noreferrer" class="group rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-lg">
              <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-teal-50 text-xl">🔗</div>
              <h3 class="text-lg font-bold text-slate-800">${r.title}</h3>
              <p class="mt-1 text-sm text-slate-500">${r.desc[currentLang]}</p>
            </a>
          `).join('')}
        </div>`;
    }

    init();

  </script>
</body>
