  <script>
    const NAV_ITEMS = [
      { id: "home", label: "🏠 الرئيسية" },
      { id: "tools", label: "🛠️ الأدوات" },
      { id: "learn", label: "🎓 تعلم البرمجة" },
      { id: "snippets", label: "📄 مقتطفات" },
      { id: "colors", label: "🎨 ألوان" },
      { id: "resources", label: "📚 مصادر" }
    ];

    let currentSection = "home";

    function init() {
      buildNav();
      navigate("home");
    }

    function buildNav() {
      const html = NAV_ITEMS.map(item => `
        <button onclick="navigate('${item.id}')" class="nav-btn flex items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition-colors text-slate-600 hover:bg-slate-100 hover:text-slate-900" data-section="${item.id}">
          ${item.label}
        </button>
      `).join("");
      document.getElementById("desktop-nav").innerHTML = html;
      document.getElementById("mobile-nav").innerHTML = html;
    }

    function navigate(section) {
      currentSection = section;
      const content = document.getElementById("content");
      content.classList.remove("fade-in");
      void content.offsetWidth;
      content.classList.add("fade-in");

      document.querySelectorAll(".nav-btn").forEach(btn => {
        if (btn.dataset.section === section) {
          btn.classList.add("bg-teal-50", "text-teal-700");
          btn.classList.remove("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        } else {
          btn.classList.remove("bg-teal-50", "text-teal-700");
          btn.classList.add("text-slate-600", "hover:bg-slate-100", "hover:text-slate-900");
        }
      });

      const renderers = { home: renderHome, tools: renderTools, learn: renderLearn, snippets: renderSnippets, colors: renderColors, resources: renderResources };
      content.innerHTML = renderers[section] ? renderers[section]() : renderHome();

      window.scrollTo({ top: 0, behavior: "smooth" });
      if (section === "tools") openToolCategory('data');
      if (section === "learn") learnBackToTracks();
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.remove("hidden");
      toast.classList.add("toast");
      setTimeout(() => {
        toast.classList.add("hidden");
        toast.classList.remove("toast");
      }, 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast("✅ تم النسخ بنجاح!"));
    }

    function renderHome() {
      const features = [
        { section: "tools", title: "🛠️ أدوات ذكية", desc: "29 أداة برمجية تفاعلية: JSON، Base64، Regex، QR، وأكتر", color: "from-teal-500 to-emerald-500" },
        { section: "learn", title: "🎓 تعلم البرمجة", desc: "خرائط طريق كاملة من الصفر للاحتراف في 5 مسارات", color: "from-sky-500 to-blue-500" },
        { section: "snippets", title: "📄 مقتطفات جاهزة", desc: "مكتبة من المقتطفات البرمجية الجاهزة للاستخدام", color: "from-amber-500 to-orange-500" },
        { section: "colors", title: "🎨 لوحات ألوان", desc: "لوحات ألوان منسّقة ومحوّل ألوان لإلهام تصميمك", color: "from-rose-500 to-pink-500" },
        { section: "resources", title: "📚 مصادر تعلّم", desc: "روابط لأهم المراجع ومقتطفات مرجعية سريعة", color: "from-indigo-500 to-violet-500" }
      ];

      return `
        <div class="space-y-10">
          <section class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-teal-700 via-teal-600 to-emerald-600 p-8 shadow-xl shadow-teal-600/20 sm:p-12">
            <div class="absolute -left-20 -top-20 h-64 w-64 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-24 -right-10 h-72 w-72 rounded-full bg-emerald-300/20 blur-3xl"></div>

                <span class="text-emerald-200">في مكان واحد</span>
              </h1>

              </p>

                <button onclick="navigate('tools')" class="rounded-xl bg-white px-6 py-3 text-sm font-semibold text-teal-700 shadow-sm transition hover:bg-teal-50">ابدأ الاستكشاف →</button>

            <div class="mb-4 flex items-center gap-2">
              <h2 class="text-xl font-bold text-slate-800">أقسام الموقع</h2>
            </div>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">

                <button onclick="navigate('${f.section}')" class="group text-right">
                  <div class="h-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-lg">
                    <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br ${f.color} shadow-md text-xl">
                      ${f.title.split(' ')[0]}

                      ${f.title.split(' ').slice(1).join(' ')}
                      <svg class="h-4 w-4 text-slate-400 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                    <p class="mt-1 text-sm leading-relaxed text-slate-500">${f.desc}</p>
                  </div>
                </button>
              `).join("")}
            </div>
          </section>

          <section class="rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-sm">
            <p class="text-sm text-slate-500 mb-2">👁️ زوار الموقع (عداد حقيقي)</p>
            <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Falisaad706-pixel.github.io%2Fprodev-app%2F&label=%D8%A7%D9%84%D8%B2%D9%88%D8%A7%D8%B1&icon=eye-fill&color=%230d9488" alt="visitors" height="28" class="mx-auto">
          </section>
        </div>
      `;
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim() !== '').map(line => {
        const cells = line.split(',');
        const obj = {};
        headers.forEach((h, idx) => obj[h] = (cells[idx] || '').trim());
        return obj;
      });
    }
    function toCSV(arr) {

    function mdToHtml(md) {
      const lines = md.split('\n'); const out = []; let inCode = false;
      for (let line of lines) {
        if (line.trim().startsWith('```')) { inCode = !inCode; out.push(inCode ? '<pre><code>' : '</code></pre>'); continue; }
        if (inCode) { out.push(line); continue; }
        const h = line.match(/^(#{1,6})\s+(.*)$/);
        if (h) { out.push(`<h${h[1].length}>${h[2]}</h${h[1].length}>`); continue; }
        let p = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/`(.+?)`/g, '<code>$1</code>').replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');

      <div id="diff-output" class="mt-4"></div>`;
    function computeDiff(a, b) {
      const A = a.split('\n'), B = b.split('\n'), n = A.length, m = B.length;
      const dp = Array.from({length:n+1}, () => new Array(m+1).fill(0));
      for (let i=n-1;i>=0;i--) for (let j=m-1;j>=0;j--) dp[i][j] = A[i]===B[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
      const res = []; let i=0,j=0;
      while (i<n && j<m) { if (A[i]===B[j]) { res.push('  '+A[i]); i++; j++; } else if (dp[i+1][j] >= dp[i][j+1]) { res.push('- '+A[i]); i++; } else { res.push('+ '+B[j]); j++; } }
      while (i<n) { res.push('- '+A[i]); i++; } while (j<m) { res.push('+ '+B[j]); j++; }
      return res;
    }

        { title: 'قراءة ملف بأمان', lang: 'Python', code: 'def read_file_safe(path):\n    try:\n        with open(path, "r", encoding="utf-8") as f:\n            return f.read()\n    except FileNotFoundError:\n        return None' },
        { title: 'Context Manager للتوقيت', lang: 'Python', code: 'from contextlib import contextmanager\nimport time\n\n@contextmanager\ndef timer(label):\n    start = time.time()\n    yield\n    print(f"{label}: {time.time()-start:.3f}s")' },

        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
