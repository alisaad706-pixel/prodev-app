<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDev JSON Formatter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 35vh; background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; box-sizing: border-box; direction: ltr; text-align: left; }
        button { width: 100%; padding: 12px; background-color: #0e639c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:active { background-color: #1177bb; }
        h3 { text-align: center; color: #569cd6; margin-top: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>🎨 JSON Formatter</h3>
    
    <textarea id="input" placeholder="الصق JSON هنا..."></textarea>
    
    <button onclick="formatJSON()">تنسيق JSON ✨</button>
    
    <textarea id="output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function formatJSON() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            try {
                const parsed = JSON.parse(input);
                output.value = JSON.stringify(parsed, null, 4);
                output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                output.value = "❌ خطأ في JSON:\n" + e.message;
                output.style.color = "#f44747";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>
</body>
</html>
