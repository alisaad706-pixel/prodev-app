<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDev Tools</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 25vh; background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; box-sizing: border-box; direction: ltr; text-align: left; }
        button { width: 100%; padding: 12px; background-color: #0e639c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:active { background-color: #1177bb; }
        h3 { text-align: center; color: #569cd6; margin-top: 5px; margin-bottom: 10px; }
        
        /* Scrollable Tabs Styling */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { height: 4px; }
        .tabs::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .tab-btn { background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background-color: #0e639c; border-color: #0e639c; color: white; }
        
        .tool-container { display: none; }
        .tool-container.active { display: block; }
        .buttons-row { display: flex; gap: 10px; }
        .buttons-row button { flex: 1; }
        
        /* Specific Tool Styles */
        .pass-display { background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 18px; text-align: center; direction: ltr; margin-bottom: 15px; word-break: break-all; user-select: all; }
        .slider-container { margin-bottom: 15px; }
        .slider-container label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .options-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; direction: ltr; }
        .option-item { flex: 1 1 40%; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .strength-bar { height: 5px; background-color: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0; transition: width 0.3s, background-color 0.3s; }
        .copy-btn { background-color: #2d7d46; }
        
        select { width: 100%; background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 14px; direction: ltr; margin-bottom: 15px; outline: none; }
        input[type="number"], input[type="text"] { background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; direction: ltr; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h3>🛠️ ProDev Tools</h3>
    
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('json', this)">🎨 JSON</div>
        <div class="tab-btn" onclick="switchTab('base64', this)">🔐 Base64</div>
        <div class="tab-btn" onclick="switchTab('pass', this)">🔑 Pass</div>
        <div class="tab-btn" onclick="switchTab('color', this)">🎨 Color</div>
        <div class="tab-btn" onclick="switchTab('hash', this)">#️⃣ Hash</div>
        <div class="tab-btn" onclick="switchTab('url', this)">🔗 URL</div>
        <div class="tab-btn" onclick="switchTab('time', this)">⏰ Time</div>
    </div>

    <!-- JSON Tool -->
    <div id="json-tool" class="tool-container active">
        <textarea id="json-input" placeholder="الصق JSON هنا..."></textarea>
        <button onclick="formatJSON()">تنسيق JSON ✨</button>
        <textarea id="json-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
    </div>

    <!-- Base64 Tool -->
    <div id="base64-tool" class="tool-container">
        <textarea id="b64-input" placeholder="الصق النص هنا..."></textarea>
        <div class="buttons-row">
            <button onclick="encodeB64()">🔒 تشفير</button>
            <button onclick="decodeB64()">🔓 فك التشفير</button>
        </div>
        <textarea id="b64-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
    </div>

    <!-- Password Tool -->
    <div id="pass-tool" class="tool-container">
        <div class="pass-display" id="pass-output">اضغط على توليد</div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="slider-container">
            <label><span>الطول:</span> <span id="length-val">16</span></label>
            <input type="range" id="pass-length" min="8" max="32" value="16" oninput="generatePass()">
        </div>
        <div class="options-container">
            <div class="option-item"><input type="checkbox" id="opt-upper" checked onchange="generatePass()"> ABC</div>
            <div class="option-item"><input type="checkbox" id="opt-lower" checked onchange="generatePass()"> abc</div>
            <div class="option-item"><input type="checkbox" id="opt-nums" checked onchange="generatePass()"> 123</div>
            <div class="option-item"><input type="checkbox" id="opt-syms" checked onchange="generatePass()"> !@#</div>
        </div>
        <button onclick="generatePass()">🔄 توليد كلمة مرور</button>
        <button class="copy-btn" onclick="copyText('pass-output', this)">📋 نسخ كلمة المرور</button>
    </div>

    <!-- Color Tool -->
    <div id="color-tool" class="tool-container">
        <div id="color-preview" style="width:100%; height: 100px; background-color: #1e88e5; border-radius: 8px; border: 1px solid #444; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);"></div>
        <div style="direction:ltr; margin-bottom:20px;">
            <label style="color:#aaa; font-size:14px; display:block; margin-bottom:5px;">HEX Code:</label>
            <div style="display:flex; align-items:center; background:#2d2d2d; border:1px solid #444; border-radius:8px; padding:10px; direction:ltr;">
                <span style="color:#888; font-size:20px; margin-left:10px;">#</span>
                <input type="text" id="hex-input" value="1E88E5" oninput="hexToRgb()" style="background:transparent; color:#4ec9b0; border:none; outline:none; font-size:20px; font-family:'Courier New'; width:100%; letter-spacing: 2px;">
            </div>
        </div>
        <div style="display:flex; gap:15px; direction:ltr; margin-bottom:15px;">
            <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;">
                <label style="color:#f44747; font-size:12px; display:block; margin-bottom:5px;">Red</label>
                <input type="number" id="r-input" value="30" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#f44747; border:none; outline:none; font-size:20px; text-align:center;">
            </div>
            <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;">
                <label style="color:#4ec9b0; font-size:12px; display:block; margin-bottom:5px;">Green</label>
                <input type="number" id="g-input" value="136" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#4ec9b0; border:none; outline:none; font-size:20px; text-align:center;">
            </div>
            <div style="flex:1; background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444;">
                <label style="color:#569cd6; font-size:12px; display:block; margin-bottom:5px;">Blue</label>
                <input type="number" id="b-input" value="229" min="0" max="255" oninput="rgbToHex()" style="width:100%; background:transparent; color:#569cd6; border:none; outline:none; font-size:20px; text-align:center;">
            </div>
        </div>
        <button onclick="copyText('rgb-output-text', this)" class="copy-btn">📋 نسخ كود RGB</button>
        <div id="rgb-output-text" style="display:none;">rgb(30, 136, 229)</div>
    </div>

    <!-- Hash Tool -->
    <div id="hash-tool" class="tool-container">
        <textarea id="hash-input" placeholder="الصق النص المراد تشفيره هنا..."></textarea>
        <select id="hash-type">
            <option value="MD5">MD5</option>
            <option value="SHA-1">SHA-1</option>
            <option value="SHA-256" selected>SHA-256</option>
            <option value="SHA-512">SHA-512</option>
        </select>
        <button onclick="generateHash()">#️⃣ إنشاء Hash</button>
        <textarea id="hash-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
        <button onclick="copyText('hash-output', this)" class="copy-btn">📋 نسخ الـ Hash</button>
    </div>

    <!-- URL Tool -->
    <div id="url-tool" class="tool-container">
        <textarea id="url-input" placeholder="الصق الرابط أو النص هنا..."></textarea>
        <div class="buttons-row">
            <button onclick="encodeUrl()">🔒 Encode</button>
            <button onclick="decodeUrl()">🔓 Decode</button>
        </div>
        <textarea id="url-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
        <button onclick="copyText('url-output', this)" class="copy-btn">📋 نسخ النتيجة</button>
    </div>

    <!-- Timestamp Tool -->
    <div id="time-tool" class="tool-container">
        <div style="direction:ltr;">
            <label style="color:#569cd6; font-size:14px; display:block; margin-bottom:5px;">Unix Timestamp:</label>
            <input type="number" id="unix-input" placeholder="مثال: 1704067200" oninput="unixToDate()">
        </div>
        <button onclick="unixToDate()" style="margin-top:0;">⏰ تحويل لتاريخ</button>
        <div id="date-output" style="background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444; margin-bottom:20px; direction:ltr; text-align:center; font-size:18px; color:#4ec9b0;">--</div>
        
        <div style="direction:ltr;">
            <label style="color:#569cd6; font-size:14px; display:block; margin-bottom:5px;">التاريخ والوقت (YYYY-MM-DD HH:MM:SS):</label>
            <input type="text" id="date-input" placeholder="مثال: 2024-01-01 12:00:00">
        </div>
        <button onclick="dateToUnix()" style="margin-top:0;">🔢 تحويل لـ Unix</button>
        <div id="unix-output" style="background:#2d2d2d; padding:10px; border-radius:8px; border:1px solid #444; direction:ltr; text-align:center; font-size:18px; color:#4ec9b0; user-select:all;">--</div>
        <button onclick="copyText('unix-output', this)" class="copy-btn" style="margin-top:10px;">📋 نسخ الـ Unix</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function switchTab(tool, element) {
            document.querySelectorAll('.tool-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tool}-tool`).classList.add('active');
            element.classList.add('active');
            element.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
            tg.HapticFeedback.impactOccurred('light');
            if(tool === 'pass') generatePass();
        }

        function copyText(elementId, btnElement) {
            const el = document.getElementById(elementId);
            let text = el.innerText || el.value;
            if(text && text !== '--' && text !== "اضغط على توليد") {
                navigator.clipboard.writeText(text);
                tg.HapticFeedback.notificationOccurred('success');
                const originalText = btnElement.innerText; btnElement.innerText = "✅ تم النسخ!"; setTimeout(() => btnElement.innerText = originalText, 1500);
            } else { tg.HapticFeedback.notificationOccurred('error'); }
        }

        // JSON Logic
        function formatJSON() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-output');
            try {
                const parsed = JSON.parse(input);
                output.value = JSON.stringify(parsed, null, 4);
                output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                output.value = "❌ خطأ في JSON:\n" + e.message;
                output.style.color = "#f44747";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Base64 Logic
        function encodeB64() {
            const input = document.getElementById('b64-input').value;
            const output = document.getElementById('b64-output');
            try {
                output.value = btoa(unescape(encodeURIComponent(input)));
                output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { output.value = "❌ خطأ في التشفير"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); }
        }
        function decodeB64() {
            const input = document.getElementById('b64-input').value;
            const output = document.getElementById('b64-output');
            try {
                output.value = decodeURIComponent(escape(atob(input)));
                output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { output.value = "❌ خطأ: النص ليس Base64 صالح!"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); }
        }

        // Password Logic
        function generatePass() {
            const length = document.getElementById('pass-length').value;
            document.getElementById('length-val').innerText = length;
            let chars = '';
            if (document.getElementById('opt-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('opt-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('opt-nums').checked) chars += '0123456789';
            if (document.getElementById('opt-syms').checked) chars += '!@#$%^&*()_+~`|}{[]:;?><,./-=';
            if (chars === '') { document.getElementById('pass-output').innerText = "يجب اختيار خيار واحد على الأقل!"; return; }
            let pass = '';
            for (let i = 0; i < length; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pass-output').innerText = pass;
            let strength = 0;
            if (length >= 12) strength += 25; if (length >= 20) strength += 25;
            if (document.getElementById('opt-upper').checked && document.getElementById('opt-lower').checked) strength += 25;
            if (document.getElementById('opt-nums').checked && document.getElementById('opt-syms').checked) strength += 25;
            const fill = document.getElementById('strength-fill'); fill.style.width = strength + '%';
            if (strength <= 25) fill.style.backgroundColor = '#f44747'; else if (strength <= 50) fill.style.backgroundColor = '#dcdcaa'; else if (strength <= 75) fill.style.backgroundColor = '#1e90ff'; else fill.style.backgroundColor = '#4ec9b0';
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Color Logic
        function hexToRgb() {
            let hex = document.getElementById('hex-input').value.replace('#', '');
            if(hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            if(hex.length === 6) {
                let r = parseInt(hex.substring(0, 2), 16); let g = parseInt(hex.substring(2, 4), 16); let b = parseInt(hex.substring(4, 6), 16);
                document.getElementById('r-input').value = r; document.getElementById('g-input').value = g; document.getElementById('b-input').value = b;
                updateColorPreview(r, g, b);
            }
            tg.HapticFeedback.impactOccurred('light');
        }
        function rgbToHex() {
            let r = parseInt(document.getElementById('r-input').value) || 0; let g = parseInt(document.getElementById('g-input').value) || 0; let b = parseInt(document.getElementById('b-input').value) || 0;
            r = Math.min(255, Math.max(0, r)); g = Math.min(255, Math.max(0, g)); b = Math.min(255, Math.max(0, b));
            let hex = r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
            document.getElementById('hex-input').value = hex.toUpperCase();
            updateColorPreview(r, g, b);
            document.getElementById('rgb-output-text').innerText = `rgb(${r}, ${g}, ${b})`;
            tg.HapticFeedback.impactOccurred('light');
        }
        function updateColorPreview(r, g, b) {
            document.getElementById('color-preview').style.backgroundColor = `rgb(${r},${g},${b})`;
            document.getElementById('color-preview').style.boxShadow = `0 4px 25px rgba(${r},${g},${b},0.6)`;
            document.getElementById('rgb-output-text').innerText = `rgb(${r}, ${g}, ${b})`;
        }

        // Hash Logic
        function generateHash() {
            const input = document.getElementById('hash-input').value;
            const type = document.getElementById('hash-type').value;
            const output = document.getElementById('hash-output');
            if (!input) { output.value = "❌ أدخل نصاً أولاً"; output.style.color = "#f44747"; return; }
            try {
                let hash = "";
                if (type === "MD5") hash = CryptoJS.MD5(input).toString();
                else if (type === "SHA-1") hash = CryptoJS.SHA1(input).toString();
                else if (type === "SHA-256") hash = CryptoJS.SHA256(input).toString();
                else if (type === "SHA-512") hash = CryptoJS.SHA512(input).toString();
                output.value = hash;
                output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { output.value = "❌ خطأ في التشفير"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); }
        }

        // URL Logic
        function encodeUrl() {
            const input = document.getElementById('url-input').value;
            const output = document.getElementById('url-output');
            output.value = encodeURIComponent(input); output.style.color = "#4ec9b0";
            tg.HapticFeedback.notificationOccurred('success');
        }
        function decodeUrl() {
            const input = document.getElementById('url-input').value;
            const output = document.getElementById('url-output');
            try {
                output.value = decodeURIComponent(input); output.style.color = "#4ec9b0";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { output.value = "❌ خطأ في فك التشفير"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); }
        }

        // Timestamp Logic
        function unixToDate() {
            const input = document.getElementById('unix-input').value;
            const output = document.getElementById('date-output');
            if (!input) { output.innerText = "--"; return; }
            const date = new Date(parseInt(input) * 1000);
            if (isNaN(date.getTime())) { output.innerText = "❌ Timestamp غير صالح"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); return; }
            output.style.color = "#4ec9b0";
            output.innerText = date.toLocaleString('en-GB', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(',', '');
            tg.HapticFeedback.notificationOccurred('success');
        }
        function dateToUnix() {
            const input = document.getElementById('date-input').value;
            const output = document.getElementById('unix-output');
            if (!input) { output.innerText = "--"; return; }
            const date = new Date(input);
            if (isNaN(date.getTime())) { output.innerText = "❌ تاريخ غير صالح"; output.style.color = "#f44747"; tg.HapticFeedback.notificationOccurred('error'); return; }
            output.style.color = "#4ec9b0";
            output.innerText = Math.floor(date.getTime() / 1000);
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
