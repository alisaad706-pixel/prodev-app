<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDev Tools</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 30vh; background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; box-sizing: border-box; direction: ltr; text-align: left; }
        button { width: 100%; padding: 12px; background-color: #0e639c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:active { background-color: #1177bb; }
        h3 { text-align: center; color: #569cd6; margin-top: 5px; margin-bottom: 10px; }
        
        /* Tabs Styling */
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; flex: 1; text-align: center; }
        .tab-btn.active { background-color: #0e639c; border-color: #0e639c; color: white; }
        
        .tool-container { display: none; }
        .tool-container.active { display: block; }
        .buttons-row { display: flex; gap: 10px; }
        .buttons-row button { flex: 1; }

        /* Password Generator Styles */
        .pass-display { 
            background-color: #2d2d2d; color: #4ec9b0; border: 1px solid #444; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 18px; text-align: center; direction: ltr; margin-bottom: 15px; word-break: break-all; user-select: all;
        }
        .slider-container { margin-bottom: 15px; }
        .slider-container label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .options-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; direction: ltr; }
        .option-item { flex: 1 1 40%; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .strength-bar { height: 5px; background-color: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0; transition: width 0.3s, background-color 0.3s; }
        .copy-btn { background-color: #2d7d46; }
    </style>
</head>
<body>
    <h3>🛠️ ProDev Tools</h3>
    
    <!-- Tabs -->
    <div class="tabs">
         <div class="tab-btn active" onclick="switchTab('json', this)">🎨 JSON</div>
        <div class="tab-btn" onclick="switchTab('base64', this)">🔐 Base64</div>
        <div class="tab-btn" onclick="switchTab('pass', this)">🔑 Pass</div>
    </div>

    <!-- JSON Tool -->
    <div id="json-tool" class="tool-container active">
        <textarea id="json-input" placeholder="الصق JSON هنا..."></textarea>
        <button onclick="formatJSON()">تنسيق JSON ✨</button>
        <textarea id="json-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
    </div>

    <!-- Base64 Tool -->
    <div id="base64-tool" class="tool-container">
        <textarea id="b64-input" placeholder="الصق النص هنا..."></textarea>
        <div class="buttons-row">
            <button onclick="encodeB64()">🔒 تشفير</button>
            <button onclick="decodeB64()">🔓 فك التشفير</button>
        </div>
        <textarea id="b64-output" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
    </div>

    <!-- Password Tool -->
    <div id="pass-tool" class="tool-container">
        <div class="pass-display" id="pass-output">اضغط على توليد</div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        
        <div class="slider-container">
            <label><span>الطول:</span> <span id="length-val">16</span></label>
            <input type="range" id="pass-length" min="8" max="32" value="16" oninput="generatePass()">
        </div>

        <div class="options-container">
            <div class="option-item"><input type="checkbox" id="opt-upper" checked onchange="generatePass()"> ABC</div>
            <div class="option-item"><input type="checkbox" id="opt-lower" checked onchange="generatePass()"> abc</div>
            <div class="option-item"><input type="checkbox" id="opt-nums" checked onchange="generatePass()"> 123</div>
            <div class="option-item"><input type="checkbox" id="opt-syms" checked onchange="generatePass()"> !@#</div>
        </div>

        <button onclick="generatePass()">🔄 توليد كلمة مرور</button>
        <button class="copy-btn" onclick="copyPass()">📋 نسخ كلمة المرور</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Tab Switching Logic
        function switchTab(tool, element) {
            document.querySelectorAll('.tool-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`${tool}-tool`).classList.add('active');
            element.classList.add('active');
